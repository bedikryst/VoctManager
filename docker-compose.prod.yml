# docker-compose.prod.yml
# Production overrides focusing on performance and security (HTTPS)
version: '3.8'

services:
  web:
    # Utilize Gunicorn WSGI server for robust, production-grade performance
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3

  celery:
    command: celery -A config worker -l INFO

  frontend:
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Load production Nginx config, GZIP core, and SSL certificates
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - ./infra/maintenance:/usr/share/nginx/html/maintenance:ro