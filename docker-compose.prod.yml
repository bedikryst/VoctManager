# docker-compose.prod.yml
version: '3.8'

services:
  db:
    restart: always

  redis:
    restart: always

  web:
    restart: always
    expose:
      - "8000"
    volumes:
      - media_volume:/app/media

  celery:
    restart: always
    volumes:
      - media_volume:/app/media

  frontend:
    build: ./frontend
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - media_volume:/app/media:ro
    depends_on:
      - web

volumes:
  postgres_data:
  media_volume: