# docker-compose.prod.yml
# Production overrides focusing on performance and security (HTTPS)

services:
  web:
    # ASGI (uvicorn workers) — required for the async SSE progress stream
    # (config.asgi). Async views hold many open SSE connections on the event
    # loop instead of blocking a worker each, so live progress scales without
    # starving the API. All existing sync views run unchanged under ASGI
    # (Django runs them in a threadpool). This matches the image's default CMD.
    command: >
      gunicorn config.asgi:application
      -k uvicorn.workers.UvicornWorker
      --bind 0.0.0.0:8000 --workers 3

  celery:
    # -B embeds the beat scheduler so CELERY_BEAT_SCHEDULE (reminders, daily
    # digest, stale-donation sweep) fires. Valid while this is the ONLY celery
    # container (beat must run as a single instance). To scale workers, remove
    # -B and add a separate one-replica `beat` service: `celery -A config beat`.
    command: celery -A config worker -B -l INFO

  frontend:
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Load production Nginx config, GZIP core, and SSL certificates
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      # Let's Encrypt HTTP-01 challenge webroot — certbot (on host) writes to
      # /var/www/certbot, nginx (in container) serves it for ACME validation.
      - /var/www/certbot:/var/www/certbot:ro
      - ./infra/maintenance:/usr/share/nginx/html/maintenance:ro
      # The Astro public site at /usr/share/nginx/html/marketing is baked INTO
      # the image by frontend/Dockerfile (web-builder stage). No host mount
      # needed — `docker compose -f docker-compose.prod.yml build frontend`
      # produces both the panel SPA and the public site in a single nginx image.
    build:
      # Build context = repo root so the Dockerfile sees both frontend/ and web/.
      # Photos under web/src/assets/photos/ and videos under web/src/assets/videos/
      # must be present on the build host (gitignored — see web/README.md §Conventions).
      context: .
      dockerfile: frontend/Dockerfile
      args:
        - VITE_GOOGLE_MAPS_FRONTEND_KEY=${VITE_GOOGLE_MAPS_FRONTEND_KEY}
        - VITE_GOOGLE_MAP_ID=${VITE_GOOGLE_MAP_ID}
        - VITE_VAPID_PUBLIC_KEY=${VITE_VAPID_PUBLIC_KEY:-${VAPID_PUBLIC_KEY}}
        - VAPID_PUBLIC_KEY=${VAPID_PUBLIC_KEY}
