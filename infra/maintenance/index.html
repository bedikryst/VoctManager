<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <!-- Retry automatically — the page is shown on 5xx, so recovery is expected soon. -->
    <meta http-equiv="refresh" content="30" />
    <title>VoctEnsemble | Chwilowa przerwa</title>

    <!-- Fully self-contained: served when the backend is DOWN, so it must not
         depend on any other request — no external fonts, scripts or styles
         (also keeps the no-third-party-embeds GDPR rule). -->
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html {
        height: 100%;
      }

      body {
        min-height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem 1.5rem;
        background: #faf8f2;
        color: #1c1a16;
        font-family: Georgia, "Times New Roman", serif;
        text-align: center;
        -webkit-font-smoothing: antialiased;
      }

      main {
        max-width: 34rem;
        animation: rise 1.1s cubic-bezier(0.22, 1, 0.36, 1) both;
      }

      .eyebrow {
        font-family: ui-sans-serif, system-ui, "Segoe UI", sans-serif;
        font-size: 0.625rem;
        font-weight: 700;
        letter-spacing: 0.4em;
        text-transform: uppercase;
        color: #8a6d3b;
        margin-bottom: 2rem;
      }

      h1 {
        font-size: clamp(2.25rem, 8vw, 4rem);
        font-weight: 400;
        font-style: italic;
        letter-spacing: -0.02em;
        line-height: 1.05;
        margin-bottom: 1.5rem;
      }

      .rule {
        width: 1px;
        height: 3.5rem;
        margin: 0 auto 1.5rem;
        background: #cfc8ba;
      }

      p.note {
        font-size: 1rem;
        line-height: 1.7;
        color: #55503f;
        margin-bottom: 2.5rem;
      }

      a.contact {
        display: inline-block;
        font-family: ui-sans-serif, system-ui, "Segoe UI", sans-serif;
        font-size: 0.625rem;
        font-weight: 700;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        text-decoration: none;
        color: #55503f;
        border: 1px solid #d8d2c4;
        border-radius: 0.75rem;
        padding: 0.75rem 1.5rem;
        transition: all 0.4s ease;
      }

      a.contact:hover {
        background: #1c1a16;
        border-color: #1c1a16;
        color: #faf8f2;
      }

      @keyframes rise {
        from {
          opacity: 0;
          transform: translateY(30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        main {
          animation: none;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <p class="eyebrow">Chwilowa przerwa</p>

      <h1>VoctEnsemble</h1>

      <div class="rule"></div>

      <p class="note">
        Trwają krótkie prace serwisowe.<br />
        Strona wróci za chwilę &mdash; odświeży się sama.
      </p>

      <a class="contact" href="mailto:kontakt@voctensemble.com">Napisz do nas</a>
    </main>
  </body>
</html>
