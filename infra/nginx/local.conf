# ==========================================
# Nginx Configuration (Local Development)
# ==========================================
# Mirrors prod.conf routing 1:1 (minus TLS/domains) so marketing, panel and API
# behavior can be verified at http://localhost exactly as it will ship. The
# panel served here is the build BAKED into the image; day-to-day hot-reload
# development keeps using Vite directly on the host (`npm run dev` →
# http://localhost:5173, talking to the API on http://localhost:8000 published
# by docker-compose.dev.yml).
#
# HEADER RULE (same as prod): any location with its own `add_header` loses the
# server-level headers and must re-include snippets/security-headers.conf.
# Caching is disabled everywhere via `expires -1`, which does NOT break that
# inheritance.

server {
    listen 80 default_server;
    server_name localhost;

    client_max_body_size 100M;

    # Docker's embedded DNS, re-resolved per TTL — survives backend container
    # recreation without an nginx restart (same rationale as prod.conf).
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $backend_upstream http://web:8000;

    root /usr/share/nginx/html/marketing;

    include /etc/nginx/snippets/security-headers.conf;

    # Container healthcheck (docker-compose).
    location = /healthz {
        access_log off;
        default_type text/plain;
        return 200 "ok";
    }

    # Graceful outage page, same wiring as prod.
    error_page 500 502 503 504 /maintenance/index.html;
    location ^~ /maintenance/ {
        root /usr/share/nginx/html;
        expires -1;
    }

    location = /donation-progress.json {
        expires -1;
        try_files /donation-progress.json =404;
    }

    # Astro emits content-addressed assets under /_astro.
    location ^~ /_astro/ {
        expires -1;
        access_log off;
        try_files $uri =404;
    }

    # Named fallback for SPA routes (see prod.conf for the rationale).
    location @spa {
        root /usr/share/nginx/html/app;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        include /etc/nginx/snippets/security-headers.conf;
        try_files /index.html =404;
    }

    # Pin /index.html to the app build so the panel service worker never
    # precaches the marketing homepage as its shell (see prod.conf).
    location = /index.html {
        root /usr/share/nginx/html/app;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        include /etc/nginx/snippets/security-headers.conf;
        try_files /index.html =404;
    }

    # The service worker file is not content-hashed — never cache it.
    location = /sw.js {
        root /usr/share/nginx/html/app;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        include /etc/nginx/snippets/security-headers.conf;
        try_files /sw.js =404;
    }

    # React panel + public auth + standalone document routes → baked SPA build.
    location ^~ /panel {
        root /usr/share/nginx/html/app;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        include /etc/nginx/snippets/security-headers.conf;
        try_files $uri $uri/ @spa;
    }
    location ^~ /login {
        root /usr/share/nginx/html/app;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        include /etc/nginx/snippets/security-headers.conf;
        try_files $uri $uri/ @spa;
    }
    location ^~ /activate {
        root /usr/share/nginx/html/app;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        include /etc/nginx/snippets/security-headers.conf;
        try_files $uri $uri/ @spa;
    }
    location ^~ /reset-password {
        root /usr/share/nginx/html/app;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        include /etc/nginx/snippets/security-headers.conf;
        try_files $uri $uri/ @spa;
    }
    location ^~ /documents/ {
        root /usr/share/nginx/html/app;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        include /etc/nginx/snippets/security-headers.conf;
        try_files $uri $uri/ @spa;
    }

    # The homepage must stay pinned to the MARKETING index — without this exact
    # match, `location /` resolves `/` via the index module's internal redirect
    # to `/index.html`, which re-matches into the app-build pin above and serves
    # the React shell at the root (see prod.conf).
    location = / {
        expires -1;
        try_files /index.html =404;
    }

    # Marketing files first (`$uri.html` = Astro clean URLs), then app build
    # assets, then the Astro homepage — identical cascade to prod.
    location / {
        expires -1;
        try_files $uri $uri.html $uri/ @app_assets;
    }

    location @app_assets {
        root /usr/share/nginx/html/app;
        try_files $uri $uri/ @landing;
    }

    location @landing {
        root /usr/share/nginx/html/marketing;
        expires -1;
        try_files /index.html =404;
    }

    # Audio/video streaming, marketing-first with app fallback.
    location ~* \.(mp4|webm|ogg|mp3|wav|flac|m4a)$ {
        root /usr/share/nginx/html/marketing;
        add_header Accept-Ranges bytes;
        include /etc/nginx/snippets/security-headers.conf;
        log_not_found off;
        access_log off;
        try_files $uri @app_static_media;
    }

    location @app_static_media {
        root /usr/share/nginx/html/app;
        add_header Accept-Ranges bytes;
        include /etc/nginx/snippets/security-headers.conf;
        access_log off;
        try_files $uri =404;
    }

    # JavaScript and WebAssembly require explicit MIME types for ES modules.
    location ~* \.(?:js|mjs|wasm)$ {
        root /usr/share/nginx/html/marketing;
        types {
            text/javascript js mjs;
            application/wasm wasm;
        }
        expires -1;
        access_log off;
        try_files $uri @app_static_js;
    }

    location @app_static_js {
        root /usr/share/nginx/html/app;
        types {
            text/javascript js mjs;
            application/wasm wasm;
        }
        expires -1;
        access_log off;
        try_files $uri =404;
    }

    location ~* \.(?:woff2|woff)$ {
        root /usr/share/nginx/html/marketing;
        add_header Access-Control-Allow-Origin "*" always;
        include /etc/nginx/snippets/security-headers.conf;
        expires -1;
        access_log off;
        try_files $uri @app_static_font;
    }

    location @app_static_font {
        root /usr/share/nginx/html/app;
        add_header Access-Control-Allow-Origin "*" always;
        include /etc/nginx/snippets/security-headers.conf;
        expires -1;
        access_log off;
        try_files $uri =404;
    }

    location ~* \.(?:css|jpg|jpeg|gif|png|ico|cur|svg|svgz|ttf|otf|webp|avif|pdf)$ {
        root /usr/share/nginx/html/marketing;
        expires -1;
        access_log off;
        try_files $uri @app_static_asset;
    }

    location @app_static_asset {
        root /usr/share/nginx/html/app;
        expires -1;
        access_log off;
        try_files $uri =404;
    }

    # Live ingestion progress (Server-Sent Events). MUST precede the generic
    # /api regex so nginx routes it here first. Buffering off + long read
    # timeout keep the stream flowing event-by-event instead of being buffered.
    location ~ ^/api/archive/editions/[^/]+/events/?$ {
        proxy_pass $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 1h;
        chunked_transfer_encoding off;
    }

    # Credential endpoints — same per-IP rate limit as prod (zone in nginx.conf).
    location = /api/token/ {
        limit_req zone=auth_limit burst=30 nodelay;
        limit_req_status 429;
        proxy_pass $backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    location = /admin/login/ {
        limit_req zone=auth_limit burst=30 nodelay;
        limit_req_status 429;
        proxy_pass $backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Django API and Admin proxy.
    location ~ ^/(api|admin)(/|$) {
        proxy_pass $backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Serve Django static files locally.
    location ^~ /static/ {
        alias /app/static/;
    }

    # Gated media: scores, concert programs and knowledge-base documents are
    # access-controlled per request by Django (role + project + lifecycle), so
    # they must NOT be reachable as bare static files. `internal` makes nginx
    # 404 any direct hit; the Django download views stream them from disk.
    location ^~ /media/score_editions/ { internal; }
    location ^~ /media/project_scores/ { internal; }
    location ^~ /media/documents/      { internal; }

    # Serve the remaining user-uploaded media (avatars, audio tracks) locally.
    location ^~ /media/ {
        alias /app/media/;
    }
}
