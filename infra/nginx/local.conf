# ==========================================
# Nginx Configuration (Local Development)
# ==========================================

upstream backend {
    server web:8000;
}

# MAIN DOMAIN -> Local App
server {
    listen 80;
    server_name localhost;

    # Allow large uploads for audio/PDF files
    client_max_body_size 100M;

    # React Frontend SPA (Vite Dev Server Proxy with HMR)
    location / {
        proxy_pass http://frontend:5173;
        proxy_set_header Host $host;
        # Required for Vite WebSockets (Hot Reloading)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Django API & Admin Proxy
    location ~ ^/(api|admin) {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Serve Django static files (Admin CSS/JS)
    location /static/ {
        alias /app/static/;
    }

    # Serve user-uploaded media files locally
    location /media/ {
        alias /app/media/;
    }
}

# TEST DOMAIN -> Landing Page Only (Local)
server {
    listen 80;
    server_name test.localhost;

    client_max_body_size 100M;

    root /usr/share/nginx/html/marketing;

    location = / {
        try_files "/LandingPage.html" =404;
    }

    location / {
        index "LandingPage.html";
        try_files $uri $uri/ @public;
    }

    location @public {
        root /usr/share/nginx/html/public;
        try_files $uri $uri/ @landing;
    }

    location @landing {
        root /usr/share/nginx/html/marketing;
        try_files "/LandingPage.html" =404;
    }
}