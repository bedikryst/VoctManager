# ==========================================
# Nginx Configuration (Local Development)
# ==========================================

upstream backend {
    server web:8000;
}

server {
    listen 80;
    server_name localhost;

    # Allow large uploads for audio/PDF files
    client_max_body_size 100M;

    # React Frontend SPA (Vite Dev Server Proxy with HMR)
    location / {
        proxy_pass http://frontend:5173;
        proxy_set_header Host $host;
        # Required for Vite WebSockets (Hot Reloading)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Django API & Admin Proxy
    location ~ ^/(api|admin) {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Serve Django static files (Admin CSS/JS)
    location /static/ {
        alias /app/static/;
    }

    # Serve user-uploaded media files locally
    location /media/ {
        alias /app/media/;
    }
}