# ==========================================
# Nginx Configuration (Local Development)
# ==========================================

upstream backend {
    server web:8000;
}

upstream vite_frontend {
    server frontend:5173;
}

server {
    listen 80;
    server_name localhost;

    client_max_body_size 100M;

    root /usr/share/nginx/html/marketing;

    # Local root mirrors production by serving the static landing page.
    location = / {
        add_header Cache-Control "no-store" always;
        try_files /LandingPage.html =404;
    }

    # Clean URL for the public privacy policy.
    location = /polityka-prywatnosci {
        add_header Cache-Control "no-store" always;
        try_files /polityka-prywatnosci.html =404;
    }

    # Clean URLs for the static marketing subpages (sibling pattern).
    location = /o-nas {
        add_header Cache-Control "no-store" always;
        try_files /o-nas.html =404;
    }
    location = /koncerty {
        add_header Cache-Control "no-store" always;
        try_files /koncerty.html =404;
    }
    location = /kontakt {
        add_header Cache-Control "no-store" always;
        try_files /kontakt.html =404;
    }

    # React panel routes stay on the Vite dev server for hot reloading.
    location ^~ /panel {
        proxy_pass http://vite_frontend;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Standalone authenticated document routes are part of the React app.
    location ^~ /documents/ {
        proxy_pass http://vite_frontend;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Vite development endpoints and transformed modules required by /panel.
    location ^~ /@vite/ {
        proxy_pass http://vite_frontend;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location ^~ /@react-refresh {
        proxy_pass http://vite_frontend;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location ^~ /@id/ {
        proxy_pass http://vite_frontend;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location ^~ /node_modules/ {
        proxy_pass http://vite_frontend;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location ^~ /src/ {
        proxy_pass http://vite_frontend;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Django API and Admin proxy.
    location ~ ^/(api|admin) {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Serve Django static files locally.
    location /static/ {
        alias /app/static/;
    }

    # Gated media: scores, concert programs and knowledge-base documents are
    # access-controlled per request by Django (role + project + lifecycle), so
    # they must NOT be reachable as bare static files. `internal` makes nginx
    # 404 any direct hit; the Django download views stream them from disk.
    location ^~ /media/score_editions/ { internal; }
    location ^~ /media/project_scores/ { internal; }
    location ^~ /media/documents/      { internal; }

    # Serve the remaining user-uploaded media (avatars, audio tracks) locally.
    location /media/ {
        alias /app/media/;
    }

    # Public assets for the static landing page.
    location / {
        try_files $uri $uri/ @public;
    }

    location @public {
        root /usr/share/nginx/html/public;
        try_files $uri $uri/ @landing;
    }

    location @landing {
        root /usr/share/nginx/html/marketing;
        try_files /LandingPage.html =404;
    }
}

server {
    listen 80;
    server_name test.localhost;

    client_max_body_size 100M;

    root /usr/share/nginx/html/marketing;

    location = / {
        try_files /LandingPage.html =404;
    }

    location / {
        index LandingPage.html;
        try_files $uri $uri/ @public;
    }

    location @public {
        root /usr/share/nginx/html/public;
        try_files $uri $uri/ @landing;
    }

    location @landing {
        root /usr/share/nginx/html/marketing;
        try_files /LandingPage.html =404;
    }
}
