# ==========================================
# Nginx Configuration (Production Enterprise)
# Author: Krystian Bugalski
# ==========================================

# Enforce HTTPS globally
server {
    listen 80;
    server_name voctensemble.com www.voctensemble.com test.voctensemble.com;
    return 301 https://$host$request_uri;
}

# 1. MAIN DOMAIN -> Maintenance / Landing Page
server {
    listen 443 ssl;
    server_name voctensemble.com www.voctensemble.com;

    ssl_certificate /etc/letsencrypt/live/voctensemble.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/voctensemble.com/privkey.pem;

    location / {
        root /usr/share/nginx/html/maintenance;
        index index.html;
    }
}

# 2. SUBDOMAIN -> React SPA + Django API
server {
    listen 443 ssl;
    server_name test.voctensemble.com;

    ssl_certificate /etc/letsencrypt/live/voctensemble.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/voctensemble.com/privkey.pem;

    # Global root for the React application
    root /usr/share/nginx/html/app;

    # React Frontend Router Fallback
    location / {
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Optimized Video Streaming Configuration
    location ~* \.(mp4|webm|ogg)$ {
        add_header Accept-Ranges bytes;
        add_header Content-Type video/mp4; 
        log_not_found off;
        access_log off;
        try_files $uri =404;
    }

    # Django API & Admin Reverse Proxy
    location ~ ^/(api|admin) {
        proxy_pass http://web:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Direct static file serving (Bypasses Python for performance)
    location /static/ {
        alias /app/static/; 
    }
    
    # Direct media file serving
    location /media/ {
        alias /app/media/; 
    }

    # Standardized Error Handling
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}