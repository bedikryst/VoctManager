# ==========================================
# Nginx Configuration (Production Enterprise)
# ==========================================
# HEADER RULE: any location with its own `add_header` loses every header
# inherited from the server level, so it must re-include
# /etc/nginx/snippets/security-headers.conf (see that file for details).

server {
    listen 80;
    server_name
        voctensemble.com
        www.voctensemble.com
        voctensemble.pl
        www.voctensemble.pl
        voctfoundation.pl
        www.voctfoundation.pl
        voctfoundation.com
        www.voctfoundation.com
        voctfoundation.org
        www.voctfoundation.org
        test.voctensemble.com;

    # Container healthcheck (docker-compose) — must answer 200 over plain HTTP,
    # before the blanket HTTPS redirect.
    location = /healthz {
        access_log off;
        default_type text/plain;
        return 200 "ok";
    }

    # Let's Encrypt HTTP-01 challenge must be served over plain HTTP without redirect.
    # Certbot writes the token under /var/www/certbot/.well-known/acme-challenge/.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# 1. Public domains -> Astro public site, React panel, and Django routes
server {
    listen 443 ssl;
    http2 on;
    server_name
        voctensemble.com
        www.voctensemble.com
        voctensemble.pl
        www.voctensemble.pl
        voctfoundation.pl
        www.voctfoundation.pl
        voctfoundation.com
        www.voctfoundation.com
        voctfoundation.org
        www.voctfoundation.org;

    client_max_body_size 100M;

    ssl_certificate /etc/letsencrypt/live/voctensemble.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/voctensemble.com/privkey.pem;

    # Docker's embedded DNS, re-resolved per TTL. With a literal `web:8000` in
    # proxy_pass nginx pins the IP it saw at startup, so recreating the backend
    # container leaves nginx proxying to a stale address (502s until a manual
    # restart). A variable upstream + resolver re-resolves every 10s.
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $backend_upstream http://web:8000;

    root /usr/share/nginx/html/marketing;

    # --- Security headers (2026 baseline, shared snippet) ---
    include /etc/nginx/snippets/security-headers.conf;

    # Graceful outage page (mounted from infra/maintenance) instead of the
    # stock nginx error page when the backend or nginx itself fails.
    error_page 500 502 503 504 /maintenance/index.html;
    location ^~ /maintenance/ {
        root /usr/share/nginx/html;
        expires -1;
    }

    # The former React marketing preview is superseded by the Astro homepage.
    location = /home {
        return 301 /$is_args$args;
    }

    location ^~ /home/ {
        return 301 /$is_args$args;
    }

    location = /donation-progress.json {
        add_header Cache-Control "public, max-age=60, must-revalidate" always;
        include /etc/nginx/snippets/security-headers.conf;
        try_files /donation-progress.json =404;
    }

    # Astro emits content-addressed assets under /_astro.
    location ^~ /_astro/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        include /etc/nginx/snippets/security-headers.conf;
        access_log off;
        try_files $uri =404;
    }

    # Named fallback for SPA routes. Using a named location instead of the URI
    # `/index.html` prevents nginx from re-running location matching on that path,
    # which would otherwise match `location /` (root = marketing) and serve the
    # Astro homepage in place of the React panel.
    location @spa {
        root /usr/share/nginx/html/app;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        include /etc/nginx/snippets/security-headers.conf;
        try_files /index.html =404;
    }

    # The panel service worker precaches its shell by fetching `/index.html`.
    # Without this exact-match, `/index.html` falls through to `location /`
    # (root = marketing) and nginx returns the Astro homepage — so the SW caches
    # the MARKETING page as the app shell and then serves the landing page for
    # /panel & /login once it's controlling the tab. Pin /index.html to the app
    # build. (Marketing uses clean URLs — `/`, never `/index.html`.)
    location = /index.html {
        root /usr/share/nginx/html/app;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        include /etc/nginx/snippets/security-headers.conf;
        try_files /index.html =404;
    }

    # The service worker file is NOT content-hashed — it must never be cached
    # long-term, or clients keep running a stale precache manifest. (It would
    # otherwise fall into the generic `\.js$` immutable location below.)
    location = /sw.js {
        root /usr/share/nginx/html/app;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        include /etc/nginx/snippets/security-headers.conf;
        try_files /sw.js =404;
    }

    # React panel routes must fall back to the built SPA entrypoint.
    location ^~ /panel {
        root /usr/share/nginx/html/app;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        include /etc/nginx/snippets/security-headers.conf;
        try_files $uri $uri/ @spa;
    }

    # Public auth routes are part of the SPA — nginx must not 404 (or worse, fall
    # through to the marketing homepage) on a direct load. These are hit cold from
    # email links (account activation `/activate?uid=&token=`, password reset
    # `/reset-password?…`), so they MUST resolve to the app build, not Astro.
    location ^~ /login {
        root /usr/share/nginx/html/app;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        include /etc/nginx/snippets/security-headers.conf;
        try_files $uri $uri/ @spa;
    }
    location ^~ /activate {
        root /usr/share/nginx/html/app;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        include /etc/nginx/snippets/security-headers.conf;
        try_files $uri $uri/ @spa;
    }
    location ^~ /reset-password {
        root /usr/share/nginx/html/app;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        include /etc/nginx/snippets/security-headers.conf;
        try_files $uri $uri/ @spa;
    }

    # Standalone authenticated document routes are part of the SPA as well.
    location ^~ /documents/ {
        root /usr/share/nginx/html/app;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        include /etc/nginx/snippets/security-headers.conf;
        try_files $uri $uri/ @spa;
    }

    # The homepage must stay pinned to the MARKETING index. Inside `location /`
    # the URI `/` resolves through the index module, whose internal redirect to
    # `/index.html` re-runs location matching and hits the app-build pin above —
    # serving the React shell at the root. An exact match with `/index.html` as
    # a non-final try_files parameter serves the file directly, no re-match.
    location = / {
        expires 5m;
        try_files /index.html =404;
    }

    # Marketing files first, then app build assets, then the Astro homepage.
    # `$uri.html` resolves every Astro clean URL (current AND future pages —
    # /o-nas, /koncerty, /koncerty/wcielenie, /press, …) without a per-page
    # block. `expires` (not add_header) keeps the security headers inherited.
    location / {
        expires 5m;
        try_files $uri $uri.html $uri/ @app_assets;
    }

    location @app_assets {
        root /usr/share/nginx/html/app;
        try_files $uri $uri/ @landing;
    }

    location @landing {
        root /usr/share/nginx/html/marketing;
        add_header Cache-Control "public, max-age=300, must-revalidate" always;
        include /etc/nginx/snippets/security-headers.conf;
        try_files /index.html =404;
    }

    # Optimized audio and video streaming configuration.
    location ~* \.(mp4|webm|ogg|mp3|wav|flac|m4a)$ {
        root /usr/share/nginx/html/marketing;
        add_header Accept-Ranges bytes;
        add_header Cache-Control "public, max-age=604800, no-transform" always;
        include /etc/nginx/snippets/security-headers.conf;
        log_not_found off;
        access_log off;
        try_files $uri @app_static_media;
    }

    location @app_static_media {
        root /usr/share/nginx/html/app;
        add_header Accept-Ranges bytes;
        add_header Cache-Control "public, max-age=604800, no-transform" always;
        include /etc/nginx/snippets/security-headers.conf;
        access_log off;
        try_files $uri =404;
    }

    # JavaScript and WebAssembly require explicit MIME types for ES modules.
    # Marketing first (parity with css/img/fonts), panel build as fallback.
    # Everything here is content-hashed except /sw.js, which is pinned above.
    location ~* \.(?:js|mjs|wasm)$ {
        root /usr/share/nginx/html/marketing;
        types {
            text/javascript js mjs;
            application/wasm wasm;
        }
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        include /etc/nginx/snippets/security-headers.conf;
        access_log off;
        try_files $uri @app_static_js;
    }

    location @app_static_js {
        root /usr/share/nginx/html/app;
        types {
            text/javascript js mjs;
            application/wasm wasm;
        }
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        include /etc/nginx/snippets/security-headers.conf;
        access_log off;
        try_files $uri =404;
    }

    # Self-hosted fonts are content-addressed and safe to cache immutably.
    location ~* \.(?:woff2|woff)$ {
        root /usr/share/nginx/html/marketing;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header Access-Control-Allow-Origin "*" always;
        include /etc/nginx/snippets/security-headers.conf;
        access_log off;
        try_files $uri @app_static_font;
    }

    location @app_static_font {
        root /usr/share/nginx/html/app;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header Access-Control-Allow-Origin "*" always;
        include /etc/nginx/snippets/security-headers.conf;
        access_log off;
        try_files $uri =404;
    }

    # Static assets are served marketing-first, with the React panel build as fallback.
    location ~* \.(?:css|jpg|jpeg|gif|png|ico|cur|svg|svgz|ttf|otf|webp|avif|pdf)$ {
        root /usr/share/nginx/html/marketing;
        add_header Cache-Control "public, max-age=2592000, no-transform" always;
        include /etc/nginx/snippets/security-headers.conf;
        access_log off;
        try_files $uri @app_static_asset;
    }

    location @app_static_asset {
        root /usr/share/nginx/html/app;
        add_header Cache-Control "public, max-age=2592000, no-transform" always;
        include /etc/nginx/snippets/security-headers.conf;
        access_log off;
        try_files $uri =404;
    }

    # -------------------------------------------------------------------
    # Live ingestion progress (Server-Sent Events)
    # -------------------------------------------------------------------
    # MUST precede the generic /api regex. SSE needs unbuffered, long-lived
    # connections — buffering off + a long read timeout so the conductor sees
    # each AI step the instant the worker writes it.
    location ~ ^/api/archive/editions/[^/]+/events/?$ {
        proxy_pass $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 1h;
        chunked_transfer_encoding off;
    }

    # -------------------------------------------------------------------
    # Credential endpoints — per-IP rate limit (zone in nginx.conf)
    # -------------------------------------------------------------------
    # Generous enough for the whole choir logging in behind one venue NAT
    # (burst 30 instant, then 1/s), tight enough to blunt dumb brute force.
    # NOTE: /api/token/refresh/ is intentionally NOT limited — clients refresh
    # tokens routinely and a storm after a rehearsal is legitimate traffic.
    location = /api/token/ {
        limit_req zone=auth_limit burst=30 nodelay;
        limit_req_status 429;
        proxy_pass $backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location = /admin/login/ {
        limit_req zone=auth_limit burst=30 nodelay;
        limit_req_status 429;
        proxy_pass $backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # -------------------------------------------------------------------
    # Backend Django (API and Admin)
    # -------------------------------------------------------------------
    location ~ ^/(api|admin)(/|$) {
        proxy_pass $backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Direct static file serving bypasses Python for performance.
    location ^~ /static/ {
        alias /app/static/;
        add_header Cache-Control "public, max-age=2592000, no-transform" always;
        include /etc/nginx/snippets/security-headers.conf;
        access_log off;
    }

    # Gated media: scores, concert programs and knowledge-base documents are
    # access-controlled per request by Django (role + project + lifecycle), so
    # they must NEVER be served as public static files. `internal` makes nginx
    # 404 any direct hit; access goes exclusively through the authenticated
    # Django download views, which stream the files from disk. Do NOT add these
    # paths back to the public block — it would reopen a full auth bypass.
    location ^~ /media/score_editions/ { internal; }
    location ^~ /media/project_scores/ { internal; }
    location ^~ /media/documents/      { internal; }

    # Direct media file serving for the public-safe remainder (avatars, audio
    # rehearsal tracks). NOTE: still public — see SECURITY follow-up on routing
    # audio tracks through a gated view too.
    location ^~ /media/ {
        alias /app/media/;
        add_header Cache-Control "public, max-age=2592000, no-transform" always;
        include /etc/nginx/snippets/security-headers.conf;
    }
}

# 2. Test domain -> permanent redirect to the main domain
server {
    listen 443 ssl;
    http2 on;
    server_name test.voctensemble.com;

    ssl_certificate /etc/letsencrypt/live/voctensemble.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/voctensemble.com/privkey.pem;

    return 301 https://voctensemble.com$request_uri;
}
