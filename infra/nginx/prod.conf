# ==========================================
# Nginx Configuration (Production Enterprise)
# ==========================================

# Enforce HTTPS globally
server {
    listen 80;
    server_name voctensemble.com www.voctensemble.com test.voctensemble.com;
    return 301 https://$host$request_uri;
}

# 1. MAIN DOMAIN -> Landing Page (with app + Django fallbacks)
server {
    listen 443 ssl;
    http2 on;
    server_name voctensemble.com www.voctensemble.com;

    client_max_body_size 100M;

    ssl_certificate /etc/letsencrypt/live/voctensemble.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/voctensemble.com/privkey.pem;

    root /usr/share/nginx/html/marketing;

    # --- Security headers (2026 baseline) ---
    # HSTS: enforce HTTPS przez 12 miesięcy, włącznie z subdomenami (preload-ready).
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    # Anti-clickjacking — odmawia osadzania witryny w iframe innej domeny.
    add_header X-Frame-Options "SAMEORIGIN" always;
    # Wymusza zadeklarowany MIME type — broni przed MIME sniffing exploits.
    add_header X-Content-Type-Options "nosniff" always;
    # Referrer minimum potrzebny do analityki i fontów cross-origin.
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # Permissions Policy: wyłącza niepotrzebne API (mic, cam, geolocation, FLoC).
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;

    # Root -> Landing Page (HTML krótki cache: 5min, treść może być iterowana)
    location = / {
        add_header Cache-Control "public, max-age=300, must-revalidate" always;
        try_files /LandingPage.html =404;
    }

    # Clean URL: /polityka-prywatnosci -> /polityka-prywatnosci.html (bez .html w pasku adresu)
    location = /polityka-prywatnosci {
        add_header Cache-Control "public, max-age=300, must-revalidate" always;
        try_files /polityka-prywatnosci.html =404;
    }

    # Marketing assets first, then app build, then fall back to LandingPage (SPA-style)
    location / {
        try_files $uri $uri/ @app_assets;
    }

    location @app_assets {
        root /usr/share/nginx/html/app;
        try_files $uri $uri/ @landing;
    }

    location @landing {
        add_header Cache-Control "public, max-age=300, must-revalidate" always;
        try_files /LandingPage.html =404;
    }

    # Optimized Audio & Video Streaming Configuration
    location ~* \.(mp4|webm|ogg|mp3|wav|flac|m4a)$ {
        root /usr/share/nginx/html/app;
        add_header Accept-Ranges bytes;
        log_not_found off;
        access_log off;
        try_files $uri =404;
    }

    # JavaScript & WebAssembly — explicit MIME type required for ES modules (HTML spec strict mode)
    location ~* \.(?:js|mjs|wasm)$ {
        root /usr/share/nginx/html/app;
        types {
            text/javascript  js mjs;
            application/wasm wasm;
        }
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        access_log off;
    }

    # Fonty self-hosted (marketing/fonts/) — content-addressed (Variable, OFL).
    # Treść pliku nie zmienia się; jeśli aktualizujemy font, zmieniamy nazwę pliku.
    # Stąd 1y immutable + CORS (preload tag z crossorigin tego wymaga).
    location ~* \.(?:woff2|woff)$ {
        root /usr/share/nginx/html/marketing;
        try_files $uri @app_static_font;
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        add_header Access-Control-Allow-Origin "*" always;
        access_log off;
    }

    location @app_static_font {
        root /usr/share/nginx/html/app;
        try_files $uri =404;
    }

    # Pozostałe statyczne assety (obrazy, CSS poza HTML, ikony) — 30d, app build.
    location ~* \.(?:css|jpg|jpeg|gif|png|ico|cur|svg|svgz|ttf|otf|webp|avif)$ {
        root /usr/share/nginx/html/app;
        expires 30d;
        add_header Cache-Control "public, no-transform" always;
        access_log off;
    }

    # -------------------------------------------------------------------
    # BACKEND DJANGO (API & Admin)
    # -------------------------------------------------------------------
    location ~ ^/(api|admin) {
        proxy_pass http://web:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Direct static file serving (Bypasses Python for performance)
    location ^~ /static/ {
        alias /app/static/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
        access_log off;
    }

    # Direct media file serving
    location ^~ /media/ {
        alias /app/media/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # Standardized Error Handling
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}

# 2. TEST DOMAIN -> Permanent redirect to main domain
server {
    listen 443 ssl;
    server_name test.voctensemble.com;

    ssl_certificate /etc/letsencrypt/live/voctensemble.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/voctensemble.com/privkey.pem;

    return 301 https://voctensemble.com$request_uri;
}
