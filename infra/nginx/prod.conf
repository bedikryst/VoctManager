# ==========================================
# Nginx Configuration (Production Enterprise)
# ==========================================

server {
    listen 80;
    server_name
        voctensemble.com
        www.voctensemble.com
        voctensemble.pl
        www.voctensemble.pl
        voctfoundation.pl
        www.voctfoundation.pl
        voctfoundation.com
        www.voctfoundation.com
        voctfoundation.org
        www.voctfoundation.org
        test.voctensemble.com;

    # Let's Encrypt HTTP-01 challenge must be served over plain HTTP without redirect.
    # Certbot writes the token under /var/www/certbot/.well-known/acme-challenge/.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# 1. Public domains -> Astro public site, React panel, and Django routes
server {
    listen 443 ssl;
    http2 on;
    server_name
        voctensemble.com
        www.voctensemble.com
        voctensemble.pl
        www.voctensemble.pl
        voctfoundation.pl
        www.voctfoundation.pl
        voctfoundation.com
        www.voctfoundation.com
        voctfoundation.org
        www.voctfoundation.org;

    client_max_body_size 100M;

    ssl_certificate /etc/letsencrypt/live/voctensemble.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/voctensemble.com/privkey.pem;

    root /usr/share/nginx/html/marketing;

    # --- Security headers (2026 baseline) ---
    # HSTS enforces HTTPS for 12 months, including subdomains.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    # Anti-clickjacking protection for cross-origin iframe embedding.
    add_header X-Frame-Options "SAMEORIGIN" always;
    # Enforce declared MIME types to reduce MIME sniffing risk.
    add_header X-Content-Type-Options "nosniff" always;
    # Keep the minimum referrer data needed for analytics and cross-origin assets.
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # Disable browser APIs that are not used by the public surface.
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;

    # Astro pages are static HTML with a short cache for content updates.
    location = / {
        add_header Cache-Control "public, max-age=300, must-revalidate" always;
        try_files /index.html =404;
    }

    # Clean URL for the public privacy policy.
    location = /polityka-prywatnosci {
        add_header Cache-Control "public, max-age=300, must-revalidate" always;
        try_files /polityka-prywatnosci.html =404;
    }

    # Clean URLs for the static marketing subpages (sibling pattern).
    location = /o-nas {
        add_header Cache-Control "public, max-age=300, must-revalidate" always;
        try_files /o-nas.html =404;
    }
    location = /koncerty {
        add_header Cache-Control "public, max-age=300, must-revalidate" always;
        try_files /koncerty.html =404;
    }
    location = /kontakt {
        add_header Cache-Control "public, max-age=300, must-revalidate" always;
        try_files /kontakt.html =404;
    }
    location = /kolofon {
        add_header Cache-Control "public, max-age=300, must-revalidate" always;
        try_files /kolofon.html =404;
    }
    location = /press {
        add_header Cache-Control "public, max-age=300, must-revalidate" always;
        try_files /press.html =404;
    }

    # The former React marketing preview is superseded by the Astro homepage.
    location = /home {
        return 301 /$is_args$args;
    }

    location ^~ /home/ {
        return 301 /$is_args$args;
    }

    location = /robots.txt {
        add_header Cache-Control "public, max-age=300, must-revalidate" always;
        try_files /robots.txt =404;
    }

    location = /sitemap.xml {
        add_header Cache-Control "public, max-age=300, must-revalidate" always;
        try_files /sitemap.xml =404;
    }

    location = /donation-progress.json {
        add_header Cache-Control "public, max-age=60, must-revalidate" always;
        try_files /donation-progress.json =404;
    }

    # Astro emits content-addressed assets under /_astro.
    location ^~ /_astro/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        access_log off;
        try_files $uri =404;
    }

    # React panel routes must fall back to the built SPA entrypoint.
    location ^~ /panel {
        root /usr/share/nginx/html/app;
        try_files $uri $uri/ /index.html;
    }

    # Standalone authenticated document routes are part of the SPA as well.
    location ^~ /documents/ {
        root /usr/share/nginx/html/app;
        try_files $uri $uri/ /index.html;
    }

    # Marketing files first, then app build assets, then the Astro homepage.
    location / {
        try_files $uri $uri/ @app_assets;
    }

    location @app_assets {
        root /usr/share/nginx/html/app;
        try_files $uri $uri/ @landing;
    }

    location @landing {
        add_header Cache-Control "public, max-age=300, must-revalidate" always;
        try_files /index.html =404;
    }

    # Optimized audio and video streaming configuration.
    location ~* \.(mp4|webm|ogg|mp3|wav|flac|m4a)$ {
        root /usr/share/nginx/html/marketing;
        add_header Accept-Ranges bytes;
        expires 7d;
        add_header Cache-Control "public, max-age=604800, no-transform" always;
        log_not_found off;
        access_log off;
        try_files $uri @app_static_media;
    }

    location @app_static_media {
        root /usr/share/nginx/html/app;
        try_files $uri =404;
    }

    # JavaScript and WebAssembly require explicit MIME types for ES modules.
    location ~* \.(?:js|mjs|wasm)$ {
        root /usr/share/nginx/html/app;
        types {
            text/javascript js mjs;
            application/wasm wasm;
        }
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        access_log off;
    }

    # Self-hosted fonts are content-addressed and safe to cache immutably.
    location ~* \.(?:woff2|woff)$ {
        root /usr/share/nginx/html/marketing;
        try_files $uri @app_static_font;
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        add_header Access-Control-Allow-Origin "*" always;
        access_log off;
    }

    location @app_static_font {
        root /usr/share/nginx/html/app;
        try_files $uri =404;
    }

    # Static assets are served marketing-first, with the React panel build as fallback.
    location ~* \.(?:css|jpg|jpeg|gif|png|ico|cur|svg|svgz|ttf|otf|webp|avif|pdf)$ {
        root /usr/share/nginx/html/marketing;
        expires 30d;
        add_header Cache-Control "public, no-transform" always;
        access_log off;
        try_files $uri @app_static_asset;
    }

    location @app_static_asset {
        root /usr/share/nginx/html/app;
        try_files $uri =404;
    }

    # -------------------------------------------------------------------
    # Backend Django (API and Admin)
    # -------------------------------------------------------------------
    location ~ ^/(api|admin) {
        proxy_pass http://web:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Direct static file serving bypasses Python for performance.
    location ^~ /static/ {
        alias /app/static/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
        access_log off;
    }

    # Direct media file serving.
    location ^~ /media/ {
        alias /app/media/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # Standardized error handling.
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}

# 2. Test domain -> permanent redirect to the main domain
server {
    listen 443 ssl;
    http2 on;
    server_name test.voctensemble.com;

    ssl_certificate /etc/letsencrypt/live/voctensemble.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/voctensemble.com/privkey.pem;

    return 301 https://voctensemble.com$request_uri;
}
