# ==========================================
# Nginx Core Configuration
# ==========================================

user  nginx;
worker_processes  auto; # Automatically adjust to the number of CPU cores

error_log  /var/log/nginx/error.log notice;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    tcp_nopush      on;
    keepalive_timeout  65;

    # --- Performance Optimization (GZIP Compression) ---
    gzip on;
    gzip_disable "msie6";
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6; # Optimal balance between compression ratio and CPU usage
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    # Define MIME types to compress on the fly
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # Load server block configurations (e.g., prod.conf, local.conf)
    include /etc/nginx/conf.d/*.conf;
}
