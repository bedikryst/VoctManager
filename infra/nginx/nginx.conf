# ==========================================
# Nginx Core Configuration
# ==========================================

user  nginx;
worker_processes  auto; # Automatically adjust to the number of CPU cores

error_log  /var/log/nginx/error.log notice;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    tcp_nopush      on;
    keepalive_timeout  65;

    # Do not advertise the nginx version in headers and error pages.
    server_tokens   off;

    # --- TLS session reuse (prod-only in practice: dev mounts this file too,
    # but has no ssl servers — the directives are valid and inert there) ---
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # --- Per-IP budget for credential endpoints ---
    # Used by prod.conf/local.conf on /api/token/ and /admin/login/. 60 r/min
    # with burst 30 tolerates a whole choir logging in behind one venue NAT
    # while still blunting dumb brute force.
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=60r/m;

    # --- Performance Optimization (GZIP Compression) ---
    gzip on;
    gzip_disable "msie6";
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6; # Optimal balance between compression ratio and CPU usage
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    # Define MIME types to compress on the fly
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # Load server block configurations (e.g., prod.conf, local.conf)
    include /etc/nginx/conf.d/*.conf;
}
