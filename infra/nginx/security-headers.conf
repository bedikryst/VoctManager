# ==========================================
# Shared security headers (2026 baseline)
# ==========================================
# nginx inherits `add_header` from the server level ONLY into locations that
# declare no `add_header` of their own. Any location that sets Cache-Control
# (or any other header) silently drops this whole set — so every such location
# MUST `include /etc/nginx/snippets/security-headers.conf;` explicitly.
# (`expires` is not an add_header and does not break inheritance.)

# HSTS enforces HTTPS for 12 months, including subdomains. Ignored by browsers
# on plain-HTTP responses, so sharing this snippet with local dev is safe.
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
# Anti-clickjacking protection for cross-origin iframe embedding.
add_header X-Frame-Options "SAMEORIGIN" always;
# Enforce declared MIME types to reduce MIME sniffing risk.
add_header X-Content-Type-Options "nosniff" always;
# Keep the minimum referrer data needed for analytics and cross-origin assets.
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
# Disable browser APIs that are not used by the public surface.
add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
