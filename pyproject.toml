[tool.ruff]
target-version = "py313"
line-length = 120
src = ["backend"]
extend-exclude = [
    ".venv",
    "backend/venv",
    "backend/media",
    "backend/static",
    "backend/**/migrations",
    "frontend",
    "voct_data",
]

[tool.ruff.lint]
select = [
    "E4",
    "E7",
    "E9",
    "F",
    "I",
    "B",
    "UP",
    "SIM",
    "RUF",
]
ignore = [
    "B904",
]

[tool.ruff.lint.per-file-ignores]
# RUF012 (mutable-class-default) is a false positive for framework-declarative
# config that is never mutated per-instance and is fully typed by django-stubs /
# djangorestframework-stubs. Annotating these with `ClassVar` fights the framework
# idiom (notably it is wrong for Django `class Meta` options). The rule stays armed
# everywhere else to catch genuine mutable-default footguns in domain code.
"backend/**/models.py" = ["RUF012"]       # Django `class Meta`: ordering / indexes / constraints
"backend/**/admin.py" = ["RUF012"]        # ModelAdmin: list_display / list_filter / fieldsets ...
"backend/**/views.py" = ["RUF012"]        # DRF: permission_classes / filter_backends / filterset_fields
"backend/**/serializers.py" = ["RUF012"]  # DRF serializer Meta + declarative config
# The dev seeder carries genuine IPA pronunciation guides (ˈ, ː, ɪ …) and typographic
# range dashes in its sample data — all legitimately "ambiguous" glyphs, not typos.
"backend/**/management/commands/seed_db.py" = ["RUF001"]

[tool.ruff.lint.isort]
known-first-party = [
    "archive",
    "config",
    "core",
    "documents",
    "logistics",
    "notifications",
    "payments",
    "roster",
]

[tool.mypy]
python_version = "3.13"
mypy_path = "backend"
files = ["backend"]
exclude = [
    "backend/.*/migrations/.*",
    "backend/venv/.*",
    "backend/media/.*",
    "backend/static/.*",
]
plugins = [
    "mypy_django_plugin.main",
    "mypy_drf_plugin.main",
    "pydantic.mypy",
]
check_untyped_defs = true
no_implicit_optional = true
warn_redundant_casts = true
warn_unused_ignores = true
warn_unreachable = true
show_error_codes = true
pretty = true

[tool.django-stubs]
django_settings_module = "config.typecheck_settings"

[[tool.mypy.overrides]]
module = [
    "anthropic.*",
    "celery.*",
    "django_filters.*",
    "environ",
    "firebase_admin.*",
    "magic.*",
    "pypdf.*",
    "pywebpush.*",
    "weasyprint.*",
]
ignore_missing_imports = true
