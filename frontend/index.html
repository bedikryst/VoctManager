    <!--
      Earliest-possible capture of the install prompt. Chromium fires
      `beforeinstallprompt` once, often before the app bundle evaluates; buffering
      it here (synchronously, during parse) guarantees the in-app install button
      never misses it. Drained on boot by shared/pwa/installController.ts.
    -->
    <script>
      window.__voctInstall = { event: null, installed: false };
      window.addEventListener("beforeinstallprompt", function (e) {
        e.preventDefault();
        window.__voctInstall.event = e;
      });
      window.addEventListener("appinstalled", function () {
        window.__voctInstall.event = null;
        window.__voctInstall.installed = true;
      });
    </script>

    <!--
      Installable PWA. Static manifest in /public (no plugin HTML injection, so
      the install criteria are auditable here). theme-color tracks the light
      panel chrome; the dark variant matches the splash/icon backdrop (#060607).
    -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#f6f5f2" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#060607" media="(prefers-color-scheme: dark)" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!--
      Self-hosted variable fonts: GDPR-compliant, zero data transfer to third-party
      providers (Google / Bunny / Adobe). Variable wght = single file per family
      covers the full weight range. Unicode-range subsetting splits latin / latin-ext
      so the browser only downloads what the page actually renders.
      Mirrors the Astro public site strategy for a consistent typographic stack.
    -->

      rel="preload"
      as="font"
      type="font/woff2"
      href="/fonts/CormorantGaramond-Variable.latin.woff2"
      crossorigin
    />
    <link
