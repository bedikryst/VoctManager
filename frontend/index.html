    <!--
      Self-hosted variable fonts — GDPR-compliant, zero data transfer to third-party
      providers (Google / Bunny / Adobe). Variable wght = single file per family
      covers the full weight range. Unicode-range subsetting splits latin / latin-ext
      so the browser only downloads what the page actually renders.
      Mirrors the strategy used in LandingPage.html for a consistent typographic
      stack across the static landing and the React SPA.
    -->
    <link
      rel="preload"
      as="font"
      type="font/woff2"
      href="/fonts/CormorantGaramond-Variable.latin.woff2"
      crossorigin
    />
    <link
      rel="preload"
      as="font"
      type="font/woff2"
      href="/fonts/Inter-Variable.latin.woff2"
      crossorigin
    />
