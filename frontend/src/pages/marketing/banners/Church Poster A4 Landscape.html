<!doctype html>
<html lang="pl">
<head>
<meta charset="utf-8" />
<title>VoctEnsemble · Plakat A4 poziomy</title>
<link rel="stylesheet" href="colors_and_type.css" />
<style>
  @page { size: A4 landscape; margin: 0; }

  html, body {
    margin: 0;
    padding: 0;
    width: 297mm;
    height: 210mm;
    background: var(--dark);
    color: var(--paper);
    font-family: var(--sans);
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }

  @media screen {
    html, body { width: auto; height: auto; min-height: 100svh; }
    body {
      background: #050504;
      display: grid;
      place-items: center;
      padding: 32px;
      box-sizing: border-box;
    }
    .sheet {
      box-shadow:
        0 30px 80px -20px rgba(0,0,0,0.8),
        0 0 0 1px rgba(244,241,233,0.06);
    }
  }

  .sheet {
    position: relative;
    width: 297mm;
    height: 210mm;
    background: var(--dark);
    overflow: hidden;
    isolation: isolate;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }

  /* Two-pole candle: warm halo on the LEFT (over the message),
     softer dim glow on the RIGHT (over the QR). */
  .sheet::before {
    content: ""; position: absolute; inset: 0;
    background:
      radial-gradient(
        circle at 32% 42%,
        rgba(232,207,144,0.36) 0%,
        rgba(232,207,144,0.16) 7%,
        rgba(198,164,91,0.07) 18%,
        rgba(198,164,91,0.02) 30%,
        transparent 48%
      ),
      radial-gradient(
        circle at 76% 52%,
        rgba(198,164,91,0.10) 0%,
        rgba(198,164,91,0.03) 18%,
        transparent 40%
      ),
      radial-gradient(
        ellipse 130% 95% at 50% 50%,
        rgba(22,21,20,0) 30%,
        rgba(5,5,4,0.55) 80%,
        rgba(5,5,4,0.85) 100%
      );
    pointer-events: none;
    z-index: 1;
  }
  .flame {
    position: absolute;
    left: 32%; top: 42%;
    width: 2.2mm; height: 2.2mm;
    margin: -1.1mm 0 0 -1.1mm;
    border-radius: 50%;
    background: #fff3d4;
    box-shadow:
      0 0 2mm rgba(255,238,196,0.95),
      0 0 6mm rgba(232,207,144,0.85),
      0 0 14mm rgba(198,164,91,0.55);
    z-index: 2;
  }

  /* Top kicker spans the whole sheet; below it a two-column body */
  .content {
    position: relative;
    z-index: 3;
    width: 100%;
    height: 100%;
    box-sizing: border-box;
    padding: 14mm 18mm;
    display: grid;
    grid-template-rows: auto 1fr;
    gap: 8mm;
  }

  /* TOP — centered */
  .top {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4mm;
  }
  .glyph { width: 4.5mm; height: auto; color: var(--candle); }
  .kicker {
    font-family: var(--mono);
    font-size: 7.5pt;
    letter-spacing: 0.36em;
    text-transform: uppercase;
    color: rgba(244,241,233,0.66);
  }
  .kicker .dot { color: var(--candle); margin: 0 0.4em; }

  /* BODY — two columns split by a vertical hairline */
  .body {
    display: grid;
    grid-template-columns: 1fr 1px 1fr;
    column-gap: 14mm;
    align-items: center;
  }
  .divider {
    width: 1px;
    height: 75%;
    background: rgba(244,241,233,0.16);
    align-self: center;
    justify-self: center;
  }

  /* LEFT — trinity + wordmark */
  .left {
    display: flex; flex-direction: column;
    justify-content: center;
    text-align: center;
    padding-right: 4mm;
  }
  .trinity .word {
    font-family: var(--serif);
    font-weight: 300;
    font-size: 56pt;
    line-height: 1.02;
    letter-spacing: -0.005em;
    color: var(--paper);
  }
  .trinity .word + .word { margin-top: 0.5mm; }
  .trinity .word.middle { font-style: italic; color: rgba(244,241,233,0.92); }
  .trinity .word .stop { color: var(--candle); }
  .trinity-en {
    margin-top: 5mm;
    font-family: var(--mono);
    font-size: 7.5pt;
    letter-spacing: 0.42em;
    text-transform: uppercase;
    color: rgba(244,241,233,0.55);
  }
  .trinity-en .sep { color: var(--candle); margin: 0 0.55em; }

  .wordmark { margin-top: 8mm; }
  .wordmark::before {
    content: "";
    display: block;
    width: 14mm; height: 1px;
    margin: 0 auto 5mm;
    background: var(--candle); opacity: 0.6;
  }
  .wordmark .name {
    font-family: var(--serif);
    font-style: italic;
    font-weight: 300;
    font-size: 20pt;
    line-height: 1;
    color: var(--paper);
  }
  .wordmark .name .v { font-style: normal; color: var(--candle); }
  .wordmark .sub {
    margin-top: 2.5mm;
    font-family: var(--mono);
    font-size: 7pt;
    letter-spacing: 0.38em;
    text-transform: uppercase;
    color: rgba(244,241,233,0.66);
  }

  /* RIGHT — QR medallion column */
  .right {
    display: flex; flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding-left: 4mm;
    gap: 4mm;
  }
  .qr-eyebrow {
    font-family: var(--mono);
    font-size: 7pt;
    letter-spacing: 0.46em;
    text-transform: uppercase;
    color: var(--candle);
  }
  .qr-eyebrow .num { color: rgba(244,241,233,0.6); margin-right: 1.2em; letter-spacing: 0.36em; }
  .qr-lede {
    font-family: var(--serif);
    font-style: italic;
    font-weight: 300;
    font-size: 15pt;
    line-height: 1.18;
    color: rgba(244,241,233,0.92);
    margin: 0;
    max-width: 22ch;
  }
  .qr-shell {
    position: relative;
    padding: 3.5mm;
    background: var(--paper);
    margin-top: 1mm;
    box-shadow:
      0 0 0 0.3mm var(--candle),
      0 0 0 2mm var(--dark),
      0 0 0 2.3mm rgba(198,164,91,0.85),
      0 0 0 2.6mm rgba(198,164,91,0.15);
  }
  .qr-shell::before {
    content: ""; position: absolute; inset: 2.3mm;
    border: 0.2mm solid rgba(22,21,20,0.10);
    pointer-events: none;
  }
  .qr-shell svg { display: block; width: 38mm; height: 38mm; }
  .qr-shell .tick {
    position: absolute; width: 4mm; height: 4mm; pointer-events: none;
  }
  .qr-shell .tick::before, .qr-shell .tick::after { content: ""; position: absolute; background: var(--candle); }
  .qr-shell .tick::before { left: 0; right: 0; top: 50%; height: 0.2mm; transform: translateY(-0.1mm); }
  .qr-shell .tick::after  { top: 0; bottom: 0; left: 50%; width: 0.2mm; transform: translateX(-0.1mm); }
  .qr-shell .tick.tl { top: -4mm; left: -4mm; }
  .qr-shell .tick.tr { top: -4mm; right: -4mm; }
  .qr-shell .tick.bl { bottom: -4mm; left: -4mm; }
  .qr-shell .tick.br { bottom: -4mm; right: -4mm; }

  .qr-caption {
    margin-top: 1.5mm;
    font-family: var(--mono);
    font-size: 6.5pt;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: rgba(244,241,233,0.66);
    line-height: 1.7;
  }
  .qr-caption .url { color: var(--paper); letter-spacing: 0.3em; }
  .qr-caption .krs {
    display: block;
    margin-top: 1mm;
    font-size: 5.5pt;
    color: rgba(244,241,233,0.42);
    letter-spacing: 0.26em;
  }
</style>
</head>
<body>

<article class="sheet" lang="pl">
  <span class="flame" aria-hidden="true"></span>

  <div class="content">

    <header class="top">
      <svg class="glyph" viewBox="0 0 24 56" fill="none" stroke="currentColor"
           stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M12 3 V47"></path>
        <path d="M3.2 12.5 L12 36.5"></path>
        <path d="M20.8 12.5 L12 36.5"></path>
        <path d="M0.5 12.5 L5.5 12.5"></path>
        <path d="M18.5 12.5 L23.5 12.5"></path>
        <circle cx="12" cy="52" r="1.6" fill="currentColor" stroke="none"></circle>
      </svg>
      <div class="kicker">Concerts Spirituels<span class="dot">·</span>MMXXVI</div>
    </header>

    <div class="body">

      <section class="left">
        <div class="trinity">
          <div class="word">Cisza<span class="stop">.</span></div>
          <div class="word middle">Głos<span class="stop">.</span></div>
          <div class="word">Światło<span class="stop">.</span></div>
          <div class="trinity-en">
            Silence<span class="sep">·</span>Voice<span class="sep">·</span>Light
          </div>
        </div>
        <div class="wordmark">
          <div class="name"><span class="v">V</span>octEnsemble</div>
          <div class="sub">Concerts Spirituels</div>
        </div>
      </section>

      <span class="divider" aria-hidden="true"></span>

      <section class="right">
        <div class="qr-eyebrow"><span class="num">III</span>Sustinete nos</div>
        <p class="qr-lede">Support the beauty<br/>of sacred music.</p>
        <div class="qr-shell">
          <span class="tick tl"></span><span class="tick tr"></span>
          <span class="tick bl"></span><span class="tick br"></span>
          <div id="qr"></div>
        </div>
        <div class="qr-caption">
          <span class="url">voctensemble.com / wesprzyj</span>
          <span class="krs">KRS · 0001237252 &nbsp;·&nbsp; Fundacja VOCTFOUNDATION</span>
        </div>
      </section>

    </div>
  </div>
</article>

<script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
<script>
  (function () {
    var qr = qrcode(5, 'H');
    qr.addData('https://voctensemble.com/wesprzyj');
    qr.make();
    var cells = qr.getModuleCount();
    var size = 240;
    var cell = size / cells;
    var INK = '#080807', PAPER = '#f4f1e9';

    var ns = 'http://www.w3.org/2000/svg';
    var svg = document.createElementNS(ns, 'svg');
    svg.setAttribute('viewBox', '0 0 ' + size + ' ' + size);
    var bg = document.createElementNS(ns, 'rect');
    bg.setAttribute('width', size); bg.setAttribute('height', size); bg.setAttribute('fill', PAPER);
    svg.appendChild(bg);

    function inEye(x, y) {
      return (x < 7 && y < 7) ||
             (x >= cells - 7 && y < 7) ||
             (x < 7 && y >= cells - 7);
    }

    var dotR = cell * 0.46;
    for (var y = 0; y < cells; y++)
      for (var x = 0; x < cells; x++) {
        if (!qr.isDark(y, x) || inEye(x, y)) continue;
        var c = document.createElementNS(ns, 'circle');
        c.setAttribute('cx', (x*cell+cell/2).toFixed(2));
        c.setAttribute('cy', (y*cell+cell/2).toFixed(2));
        c.setAttribute('r',  dotR.toFixed(2));
        c.setAttribute('fill', INK);
        svg.appendChild(c);
      }
    function drawEye(gx, gy) {
      var x = gx*cell, y = gy*cell, s = 7*cell;
      function rect(rx, ry, w, h, r, fill) {
        var el = document.createElementNS(ns, 'rect');
        el.setAttribute('x', rx.toFixed(2)); el.setAttribute('y', ry.toFixed(2));
        el.setAttribute('width', w.toFixed(2)); el.setAttribute('height', h.toFixed(2));
        el.setAttribute('rx', r.toFixed(2)); el.setAttribute('ry', r.toFixed(2));
        el.setAttribute('fill', fill);
        svg.appendChild(el);
      }
      rect(x, y, s, s, cell*1.6, INK);
      rect(x+cell, y+cell, 5*cell, 5*cell, cell*1.1, PAPER);
      rect(x+2*cell, y+2*cell, 3*cell, 3*cell, cell*0.7, INK);
    }
    drawEye(0, 0); drawEye(cells-7, 0); drawEye(0, cells-7);

    document.getElementById('qr').appendChild(svg);
  })();

  (function () {
    function ready() { return !!document.querySelector('#qr svg'); }
    var fontsReady = (document.fonts && document.fonts.ready) ? document.fonts.ready : Promise.resolve();
    fontsReady.then(function () {
      (function wait() {
        if (ready()) setTimeout(function () { window.print(); }, 500);
        else requestAnimationFrame(wait);
      })();
    });
  })();
</script>

</body>
</html>
