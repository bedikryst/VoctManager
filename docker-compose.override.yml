# docker-compose.override.yml
# Local development overrides for hot-reloading and direct host mapping
version: '3.8'

services:
  web:
    # Use standard Django dev server for automatic code reloading
    command: python manage.py runserver 0.0.0.0:8000
    ports:
      - "8000:8000"  
    volumes:
      # CRITICAL: Mount local codebase only in development
      - ./backend:/app  

  celery:
    command: celery -A config worker -l INFO
    volumes:
      # Ensure Celery workers reflect local code changes
      - ./backend:/app  

  frontend:
    ports:
      - "80:80"
    volumes:
      # Load local HTTP Nginx configuration
      - ./infra/nginx/local.conf:/etc/nginx/conf.d/default.conf:ro