<!doctype html>
<html
  lang="{{ lang|default:'en' }}"
  xmlns="http://www.w3.org/1999/xhtml"
  xmlns:v="urn:schemas-microsoft-com:vml"
  xmlns:o="urn:schemas-microsoft-com:office:office"
>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="x-apple-disable-message-reformatting" />
    <title></title>
    <style>
      /* Enterprise Email Reset */
      body,
      p,
      h1,
      h2,
      h3,
      h4,
      h5,
      h6 {
        margin: 0;
        padding: 0;
      }
      img {
        border: 0;
        outline: none;
        text-decoration: none;
        -ms-interpolation-mode: bicubic;
        max-width: 100%;
        height: auto;
      }
      body {
        margin: 0;
        padding: 0;
        width: 100% !important;
        -webkit-text-size-adjust: 100%;
        -ms-text-size-adjust: 100%;
        background-color: #fafafa;
      }

      /* Typography System */
      .email-container {
        max-width: 600px;
        margin: 0 auto;
        background-color: #ffffff;
      }
      .content-cell {
        padding: 48px 40px;
      }

      h1,
      h2,
      h3 {
        font-family: "Playfair Display", Georgia, serif;
        color: #111827;
        font-weight: 400;
      }
      p,
      li,
      a {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica,
          Arial, sans-serif;
        color: #4b5563;
        font-size: 16px;
        line-height: 1.6;
      }

      /* Premium UI Elements */
      .divider {
        border-top: 1px solid #e5e7eb;
        margin: 32px 0;
      }
      .logo {
        width: 140px;
        height: auto;
        margin-bottom: 40px;
      }
      .btn {
        display: inline-block;
        background-color: #111827;
        color: #ffffff !important;
        text-decoration: none;
        padding: 14px 28px;
        border-radius: 4px;
        font-size: 14px;
        font-weight: 500;
        letter-spacing: 0.05em;
        text-transform: uppercase;
        margin-top: 24px;
      }
      .footer {
        background-color: #fafafa;
        padding: 32px 40px;
        text-align: center;
      }
      .footer p {
        font-size: 12px;
        color: #9ca3af;
        margin-bottom: 8px;
      }

      /* Dark Mode Support (dla klientów, które to wspierają, np. Apple Mail) */
      @media (prefers-color-scheme: dark) {
        body {
          background-color: #111827 !important;
        }
        .email-container {
          background-color: #1f2937 !important;
        }
        h1,
        h2,
        h3 {
          color: #f9fafb !important;
        }
        p,
        li {
          color: #d1d5db !important;
        }
        .divider {
          border-top: 1px solid #374151 !important;
        }
        .footer {
          background-color: #111827 !important;
        }
        .btn {
          background-color: #f9fafb !important;
          color: #111827 !important;
        }
      }
    </style>
  </head>
  <body>
    <div
      style="background-color: #fafafa; padding-top: 40px; padding-bottom: 40px"
    >
      <table
        border="0"
        cellpadding="0"
        cellspacing="0"
        class="email-container"
        width="100%"
      >
        <tr>
          <td align="center" style="padding-top: 48px; padding-bottom: 0">
            <img
              src="./fleurdelis.png"
              alt="VoctEnsemble"
              class="logo"
            />
          </td>
        </tr>

        <tr>
          <td class="content-cell" align="left">
            {% block content %} {% endblock %}
          </td>
        </tr>

        <tr>
          <td class="footer">
            <p>VoctManager &copy; {% now "Y" %} VoctEnsemble.</p>
            <p>
              Wygenerowano automatycznie. Prosimy nie odpowiadać na tę
              wiadomość.
            </p>
          </td>
        </tr>
      </table>
    </div>
  </body>
</html>
