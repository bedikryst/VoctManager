<!doctype html>
<html
  lang="{{ lang|default:'en' }}"
  xmlns="http://www.w3.org/1999/xhtml"
  xmlns:v="urn:schemas-microsoft-com:vml"
  xmlns:o="urn:schemas-microsoft-com:office:office"
>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="x-apple-disable-message-reformatting" />
    <title></title>
    <style>
      /* ── Reset ── */
      body, p, h1, h2, h3, h4, h5, h6 { margin: 0; padding: 0; }
      img { border: 0; outline: none; text-decoration: none;
            -ms-interpolation-mode: bicubic; max-width: 100%; }
      body {
        margin: 0; padding: 0; width: 100% !important;
        -webkit-text-size-adjust: 100%; -ms-text-size-adjust: 100%;
        background-color: #f5f3ef;
      }

      /* ── Container ── */
      .email-container { max-width: 600px; margin: 0 auto; }

      /* ── Typography ── */
      h1, h2, h3 {
        font-family: 'Playfair Display', Georgia, 'Times New Roman', serif;
        color: #111827;
        font-weight: 400;
        line-height: 1.3;
      }
      p, li, td, a, span {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto,
                     Helvetica, Arial, sans-serif;
        font-size: 15px;
        line-height: 1.7;
        color: #4b5563;
      }
      a { color: #111827; }

      /* ── Layout helpers ── */
      .content-cell { padding: 48px 52px; }
      .overline {
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        color: #9ca3af;
        margin-bottom: 14px;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto,
                     Helvetica, Arial, sans-serif;
      }
      .divider {
        border: 0;
        border-top: 1px solid #e8e3d8;
        margin: 32px 0;
      }

      /* ── CTA Button ── */
      .btn {
        display: inline-block;
        background-color: #111827;
        color: #ffffff !important;
        text-decoration: none;
        padding: 15px 36px;
        border-radius: 3px;
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto,
                     Helvetica, Arial, sans-serif;
      }

      /* ── Cards ── */
      .info-card {
        background-color: #faf9f7;
        border: 1px solid #e8e3d8;
        border-left: 3px solid #c9a764;
        padding: 18px 22px;
        margin: 24px 0;
      }
      .info-card p {
        font-size: 14px;
        margin: 0 0 6px 0;
        line-height: 1.5;
      }
      .info-card p:last-child { margin: 0; }
      .info-label {
        font-weight: 600;
        color: #111827;
        font-size: 14px;
      }
      .security-card {
        background-color: #fffbeb;
        border: 1px solid #fde68a;
        border-left: 3px solid #f59e0b;
        padding: 18px 22px;
        margin: 24px 0;
      }
      .danger-card {
        background-color: #fff1f2;
        border: 1px solid #fecdd3;
        border-left: 3px solid #f43f5e;
        padding: 18px 22px;
        margin: 24px 0;
      }

      /* ── Change pills ── */
      .change-pill {
        display: inline-block;
        background-color: #f3f0ea;
        border: 1px solid #e8e3d8;
        padding: 3px 10px;
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: #6b7280;
        margin: 2px 3px 2px 0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto,
                     Helvetica, Arial, sans-serif;
      }

      /* ── Footer ── */
      .email-footer {
        background-color: #f5f3ef;
        padding: 28px 52px;
        text-align: center;
      }
      .email-footer p {
        font-size: 12px;
        color: #9ca3af;
        margin: 0 0 4px 0;
      }

      /* ── Dark mode ── */
      @media (prefers-color-scheme: dark) {
        body, .email-outer { background-color: #0f172a !important; }
        .email-body        { background-color: #1e293b !important; }
        .logo-cell         { background-color: #1e293b !important; }
        .hairline-cell     { background-color: #1e293b !important; }
        .content-cell      { background-color: #1e293b !important; }
        .email-footer      { background-color: #0f172a !important; }
        h1, h2, h3         { color: #f1f5f9 !important; }
        p, li, td, span    { color: #94a3b8 !important; }
        .info-label        { color: #f1f5f9 !important; }
        .overline          { color: #64748b !important; }
        .info-card {
          background-color: #1e3a5f !important;
          border-color: #334155 !important;
        }
        .security-card {
          background-color: #2d2600 !important;
          border-color: #854d0e !important;
        }
        .divider           { border-top-color: #334155 !important; }
        .btn {
          background-color: #f1f5f9 !important;
          color: #0f172a !important;
        }
        .email-footer p    { color: #475569 !important; }
      }
    </style>
  </head>
  <body>
    <div class="email-outer" style="background-color: #f5f3ef; padding: 40px 16px;">
      <table
        border="0" cellpadding="0" cellspacing="0"
        class="email-container"
        width="600"
        align="center"
        style="max-width: 600px; width: 100%;"
      >

        <!-- ── Gold accent bar ── -->
        <tr>
          <td style="background-color: #c9a764; height: 4px; font-size: 0; line-height: 0; mso-line-height-rule: exactly;">&nbsp;</td>
        </tr>

        <!-- ── Logo ── -->
        <tr>
          <td
            class="logo-cell"
            align="center"
            style="background-color: #ffffff; padding: 40px 52px 32px;"
          >
            {% if logo_url %}
              <img
                src="{{ logo_url }}"
                alt="VoctEnsemble"
                height="48"
                style="height: 48px; width: auto; display: block; margin: 0 auto;"
              />
            {% else %}
              <!-- LOGO PLACEHOLDER — replace with <img src="..."> when ready -->
              <p style="font-family: 'Playfair Display', Georgia, 'Times New Roman', serif;
                         font-size: 21px; font-weight: 400; letter-spacing: 0.28em;
                         color: #111827; margin: 0; text-align: center;
                         text-transform: uppercase;">
                VOCT<span style="color: #c9a764;">&middot;</span>ENSEMBLE
              </p>
            {% endif %}
          </td>
        </tr>

        <!-- ── Hairline under logo ── -->
        <tr>
          <td
            class="hairline-cell"
            style="background-color: #ffffff; padding: 0 52px;"
          >
            <div style="border-top: 1px solid #e8e3d8; font-size: 0; line-height: 0;">&nbsp;</div>
          </td>
        </tr>

        <!-- ── Main content ── -->
        <tr>
          <td class="content-cell email-body" style="background-color: #ffffff; padding: 48px 52px;">
            {% block content %}{% endblock %}
          </td>
        </tr>

        <!-- ── Footer ── -->
        <tr>
          <td class="email-footer" style="background-color: #f5f3ef; padding: 28px 52px; text-align: center;">
            {% load i18n %}
            <p style="font-size: 12px; color: #9ca3af; margin: 0 0 4px 0;
                       font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;">
              VoctManager &copy; {% now "Y" %} VoctEnsemble.
            </p>
            <p style="font-size: 12px; color: #b8a99a; margin: 0;
                       font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;">
              {% translate "Automatically generated. Please do not reply to this message." %}
            </p>
          </td>
        </tr>

      </table>
    </div>
  </body>
</html>
