<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>{% block subject %}VoctManager Notification{% endblock %}</title>
  </head>
  <body style="font-family: Arial, sans-serif; color: #333; line-height: 1.6">
    <div style="max-width: 600px; margin: 0 auto; padding: 20px">
      <h2>VoctManager</h2>
      {% block content %}{% endblock %}
      <hr style="border: 0; border-top: 1px solid #eaeaea; margin-top: 40px" />
      <p style="font-size: 12px; color: #888">
        This is an automated message from VoctManager. You can update your
        notification preferences in your dashboard settings.
      </p>
    </div>
  </body>
</html>
