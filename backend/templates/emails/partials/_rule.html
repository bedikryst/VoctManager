{% comment %}Hairline divider. Param: mb (margin-bottom px, default 44).{% endcomment %}
<table width="100%" border="0" cellspacing="0" cellpadding="0" style="margin: 0 0 {{ mb|default:44 }}px 0;">
  <tr>
    <td style="border-top: 1px solid #ede8df; font-size: 0; line-height: 0;">&nbsp;</td>
  </tr>
</table>
