version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: voct_redis
    restart: always

  web:
    build: ./backend
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3
    volumes:
      - ./backend:/app  
    depends_on:
      - db
      - redis
    env_file:
      - .env  
    environment:
      - DB_HOST=db

  celery:
    build: ./backend
    container_name: voct_celery
    command: celery -A config worker -l INFO
    volumes:
      - ./backend:/app  
    env_file:
      - .env
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      - web
      - redis
      - db

  frontend:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"  
    volumes:
      - ./infra/maintenance:/usr/share/nginx/html/maintenance:ro  
      - ./backend/static:/app/static:ro
      - ./backend/media:/app/media:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - ./infra/nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro 
    depends_on:
      - web

volumes:
  postgres_data: