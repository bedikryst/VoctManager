# docker-compose.yml
# Base configuration mapping shared infrastructure components

services:
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: voct_redis
    restart: always
    # Secure Redis with a password to prevent unauthorized message queue access
    command: redis-server --requirepass ${REDIS_PASSWORD:-voct_super_secret_redis}

  web:
    build: ./backend
    restart: always
    depends_on:
      - db
      - redis
    env_file:
      - .env  
    environment:
      - DB_HOST=db
      # Inject authenticated Redis URLs for Celery task queuing
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD:-voct_super_secret_redis}@redis:6379/0
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD:-voct_super_secret_redis}@redis:6379/0
    volumes:
      # Bind Mounts
      - ./voct_data/media:/app/media
      - ./voct_data/static:/app/static  

  celery:
    build: ./backend
    container_name: voct_celery
    restart: always
    depends_on:
      - web
      - redis
      - db
    env_file:
      - .env
    environment:
      - DB_HOST=db
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD:-voct_super_secret_redis}@redis:6379/0
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD:-voct_super_secret_redis}@redis:6379/0
    volumes:
      # Bind Mounts
      - ./voct_data/media:/app/media
      - ./voct_data/static:/app/static  

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: always
    depends_on:
      - web
    volumes:
      # Nginx receives static and media files as read-only (ro)
      - ./voct_data/media:/app/media:ro
      - ./voct_data/static:/app/static:ro

volumes:
  postgres_data: