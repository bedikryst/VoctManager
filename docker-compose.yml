# docker-compose.yml
# ==========================================
# VoctManager Infrastructure Configuration
# Standard: Enterprise SaaS 2026
# ==========================================

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      # Ensures the database is actually ready to accept connections before other services start
      test: ["CMD", "pg_isready", "-U", "${DB_USER}", "-d", "${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: voct_redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD:-voct_super_secret_redis}
    healthcheck:
      # Verification that Redis is responding to pings
      test:
        [
          "CMD-SHELL",
          "redis-cli -a ${REDIS_PASSWORD:-voct_super_secret_redis} ping | grep PONG",
        ]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - DB_HOST=db
      # Centralized Redis connection strings with authentication
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD:-voct_super_secret_redis}@redis:6379/0
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD:-voct_super_secret_redis}@redis:6379/0
    volumes:
      - ./voct_data/media:/app/media
      - ./voct_data/static:/app/static

  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: voct_celery
    restart: always
    depends_on:
      web:
        condition: service_started
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - DB_HOST=db
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD:-voct_super_secret_redis}@redis:6379/0
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD:-voct_super_secret_redis}@redis:6379/0
    volumes:
      - ./voct_data/media:/app/media
      - ./voct_data/static:/app/static

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      # Vite resolves env vars at build time, baking them into the static bundle.
      # Because `.env` is excluded by .dockerignore, every VITE_* must be passed
      # explicitly here (sourced from the root `.env` via Compose interpolation).
      args:
        - VITE_API_URL=${VITE_API_URL-}
        - VITE_GOOGLE_MAPS_FRONTEND_KEY=${VITE_GOOGLE_MAPS_FRONTEND_KEY-}
        - VITE_GOOGLE_MAP_ID=${VITE_GOOGLE_MAP_ID-}
        - VITE_VAPID_PUBLIC_KEY=${VAPID_PUBLIC_KEY-}
    restart: always
    depends_on:
      web:
        condition: service_started
    volumes:
      # Serve media and static files via Nginx as read-only
      - ./voct_data/media:/app/media:ro
      - ./voct_data/static:/app/static:ro

volumes:
  postgres_data:
