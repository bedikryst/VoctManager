# Concert "stations" — the Concerts Spirituels cycle. Add a new concert by appending an
# entry; order drives the sequence (Via rail) and the page layout. Images are bare photo()
# names under src/assets/photos (bg expects -desktop / -mobile crops).
# The `about:` block feeds the /o-nas milestone list (place/blurb/img) — all optional,
# falling back to venue/essence; a missing img renders the milestone text-only.

- id: wcielenie
  order: 1
  roman: "I"
  latin: Incarnatio
  title: Kontemplacja Wcielenia
  meta: "Bazylika NSPJ, Kraków · 20 stycznia 2024"
  venue: "Bazylika NSPJ, Kraków"
  date: "2024-01-20"
  time: "20:00"
  address: "ul. Kopernika 26, Kraków"
  viaDate: sty 2024
  about:
    place: "Bazylika NSPJ · Kraków"
    blurb: "Debiut cyklu Koncertów Duchowych: renesans, barok i współczesność ułożone wokół tajemnicy Bożego Narodzenia oraz Wcielenia."
    img: o-nas-wcielenie
  accent: "#c6a45b"
  essence: "Próba wejścia w tajemnicę Wcielenia: od zapowiedzi Izajasza po kantyk Symeona, od zimowego półmroku Sandströma po jasność Monteverdiego."
  facts:
    - 4 / 8 / 12 głosów
    - Renesans — XXI w.
    - Debiut cyklu
  bg: st-wcielenie-bg
  poster: poster-wcielenie
  posterAlt: Plakat koncertu Kontemplacja Wcielenia
  realizacja: "Realizacja: Ars Sonora Studio"
  video:
    asset: landing-modal
    caption: 'Wybrane fragmenty koncertu „Kontemplacja Wcielenia" · VoctEnsemble 2024'
    poster: kd-wcielenie-5
  # spotify (private — uncomment when playlist becomes public): https://open.spotify.com/playlist/7GjD3G9ICb6GLbEQEIDe4v
  hasPage: true
  programLede: "Dziesięć spojrzeń — i bis"
  programArc: >-
    Kolejność jest tu częścią kompozycji. Wieczór biegnie jak historia zbawienia: od różdżki
    z proroctwa Izajasza, przez nocną straż pasterzy i adwentowy róg Gallusa, po same narodziny.
    Potem kontemplacja maryjna — i nagły cień: kołysanka matki nad dzieckiem skazanym przez
    Heroda. Domyka ją kantyk Symeona w świątyni — „moje oczy ujrzały Twoje zbawienie" — czyli
    spełnienie obietnicy, od której program się zaczął; stąd już tylko uwielbienie i radość bisu.
  prologue: >-
    Dwudziesty stycznia, wieczór, Bazylika Najświętszego Serca Pana Jezusa w Krakowie —
    dwadzieścia dni po tym, jak zespół powstał. Zanim zabrzmi pierwszy dźwięk,
    o. Jarek Naliwajko SJ wprowadza w tajemnicę Wcielenia.
  verbum:
    speaker: "o. Jarek Naliwajko SJ · 20 stycznia 2024"
    quote: >-
      Odkrywanie tajemnicy kończy się zawsze tak samo. Prowadzi do kolejnej tajemnicy.
      W przeciwnym wypadku to nie ona, tylko wiedza lub rutyna.
    text: |-
      Dobry wieczór Państwu, Szczęść Boże. Witam serdecznie wszystkich przybyłych do naszej
      świątyni, do Bazyliki Najświętszego Serca Jezusa.

      Szanowni Państwo, dzisiejszym wieczorem, tym inaugurującym koncertem, wykonawcy chcą nas
      zaprosić do wciąż niepokojącego świata ducha, który ich samych — wykonawców, autorów
      dzisiejszego spotkania — przynagla do swoistego wewnętrznego ruchu, wręcz wyrzucenia
      z siebie tego niepokoju, czyli konieczności opowiedzenia o tajemnicy ducha.

      Bo chwilowo, czyli od jakichś dwustu tysięcy lat, ludzkość nie opracowała lepszego słowa
      na tę intrygującą, a nierozpoznaną do końca przez siebie część zanurzenia siebie samych
      w czasie. Nie wynaleziono lepszego słowa jak duch. Chcą nam zdradzić tajemnicę. Jednak
      odkrywanie tajemnicy kończy się zawsze tak samo. Prowadzi do kolejnej tajemnicy.
      W przeciwnym wypadku to nie ona, tylko wiedza lub rutyna — tak przez niektórych
      uwielbiana, mylona często z życiem.

      Ale zacznijmy od plakatu na dzisiejszy koncert — powinien się wyświetlać na naszych
      monitorach. To tło kobaltowe, a na nim rozchodzące się — zauważcie Państwo — lub
      schodzące się białe promienie, utworzone z liter układających słowa. Są one schodzące
      lub wychodzące, czy wchodzące, ale o kierunku decyduje odbiorca, bo w życiu albo schodzi
      się do centrum, albo wychodzi się, odchodzi się z centrum, w którym nie ma nic oprócz
      tego właśnie tła kobaltowego lub indygo na tle białej plamki — jak na tym plakacie.

      A te trzy kolory kojarzone są z symbolem duchowości najwyższej — tak na przykład
      w antropologii indyjskiej: indygo to najwyższa czakra, łącząca z duchem wszechświata,
      tak jak kolor biały w naszej tradycji, przypisywany Absolutowi. Idąc dalej tym tropem:
      indygo czy kobalt używano do barwienia szat królewskich, a więc pomazańców Bożych.

      Demokracja — niestety i na szczęście — uczyniła z nas wszystkich równych, a tak naprawdę
      to rutyna demokracji, czy raczej: demokracja to rutyna. Jednak wykonawcy dziś pragną nas
      wyprowadzić z komfortu dnia codziennego, w którym rutyna zawładnęła nami, dając złudne
      uczucie bezpieczeństwa, właśnie jakiejś równości — bo z pewnością rutyna to siostra
      zapomnienia o świecie ducha.

      Wykonawcy proponują nam jeszcze raz spotkać się z Wcieleniem. Wyprowadzają nas z rutyny,
      aby zaprowadzić nas do Wcielenia. Choć w momencie, w którym to słowo wypowiadam i zamienia
      się ono w falę dźwiękową, odzieram Wcielenie z całego jego bezkresu. Staje się pozornie zrozumiałe,
      a przez to całkowicie nieprawdziwe, a z pewnością zamazane, bo zostaje odarte z tajemnicy.
      Wcielenie wypływa, jednocześnie wpływając — jak te promienie na plakacie — ze źródła
      wypływa do nas, a z nami wpływa z powrotem do centrum.

      Koncert duchowy — bo taki nadali autorzy podtytuł całemu temu cyklowi, którego i my
      będziemy nie tylko świadkami, ale w jakimś sensie twórcami — jest pierwszą odsłoną.
      Dzisiejszy wieczór jest niczym innym jak spotkaniem ze sobą samym, gdy tylko zgodzimy się
      na ten nasz wewnętrzny ruch, aby odkryć, że nie jesteśmy sami — ani w sobie, ani wokół
      siebie — a pełnia stara się znaleźć wypowiedzenie przekraczające granice, a nie
      zamazujące ich, właśnie poprzez muzykę.

      I już na koniec — prośba od wykonawców, aby nie klaskać w trakcie programu, czyli
      całkowicie poddajemy się zawieszeniu świadomości i dajemy się poruszać jedynie jak fale
      bezkresnego oceanu. Nasłuchujemy, a aktywna niech będzie jedynie nasza uważność na ducha.
      Powitajmy zatem dzisiejszych wykonawców.
    bridge: >-
      Potem cichnie gwar i z zimowego półmroku podnosi się różdżka Sandströma.
  movements:
    - id: prophetia
      lat: Prophetia
      pl: Zapowiedź
      line: >-
        Zanim padnie słowo o Dziecku, brzmi obietnica: różdżka z pnia Jessego, krzyk pasterzy
        w nocy, adwentowy róg obwieszczający nadejście.
    - id: nativitas
      lat: Nativitas
      pl: Narodziny
      line: >-
        Dziecko przychodzi. Wokół Niego zbiera się kontemplacja Matki — od renesansowej
        Hiszpanii po polską kolędę.
    - id: umbra
      lat: Umbra
      pl: Cień
      interlude:
        lat: "Vox in Rama audita est, ploratus et ululatus: Rachel plorans filios suos."
        pl: "W Rama słychać lament i wielki płacz: Rachel opłakuje swoje dzieci."
        ref: "Jr 31, 15 · Mt 2, 18"
      line: >-
        Tuż po narodzinach pada cień: kołysanka matki nad dzieckiem, które Herod skazał
        na śmierć.
    - id: impletio
      lat: Impletio
      pl: Spełnienie
      line: >-
        W świątyni Symeon bierze Dziecko na ręce — „moje oczy ujrzały Twoje zbawienie".
        Obietnica z początku wieczoru dopełnia się.
    - id: laus
      lat: Laus
      pl: Uwielbienie
      line: >-
        Zostaje już tylko nowa pieśń i radość: Chrystus się narodził.
  credits:
