  prologue: >-
    Pierwszy czerwca 2024, Dworek Gościnny w Szczawnicy — jedyny wieczór tego cyklu poza kościołem.
    Program o wołaniu gór zabrzmiał w górach: za oknami Pieniny. Dwanaście głosów, skrzypce
    Radu Ropotana, dwie części i przerwa.
  reflectionNote: >-
    Góry uczą słuchania: głos posłany w przestrzeń wraca odmieniony. Ten program nasłuchuje,
    co echo robi z ludzkim wołaniem — czy zostaje krzykiem, czy staje się modlitwą, lotem,
    pieśnią. I czy samotny głos może liczyć na odpowiedź.
  credits:
    - { role: "Dyrygent", name: "Florent de Bazelaire" }
  # Roster consent: names cleared for concert pages ONLY (do not reuse elsewhere).
  roster:
    groups:
      - { voice: "Soprany", names: ["Liliana Pociecha", "Bernadetta Gałda", "Maria Marczewska", "Anna Kanarkiewicz"] }
      - { voice: "Alty", names: ["Natalia Czajkowska", "Natalia Lechwar"] }
      - { voice: "Tenory", names: ["Paweł Żurawski", "Piotr Szewczyk", "Mateusz Solarz"] }
      - { voice: "Basy", names: ["Michał Jan Barański", "Szymon Maziarz", "Jakub Ciępka"] }
    note: >-
      Skład wieczoru w Szczawnicy, 1 czerwca 2024; na skrzypcach — Radu Ropotan.
  # The composer's own words on the TITLE work — the evening takes its name from this piece,
  # so the quote is load-bearing here (moved from wcielenie, where its essence stays in the
  # work's program note). Full booklet version, with the resolution the short form dropped.
  pullQuote:
    text: >-
      Le cri des bergers jest pieśnią samotności — krzykiem trwogi, cierpienia i niepewności;
      zagubioną pieśnią, która rezonuje wewnątrz każdego z nas. Jeśli umiemy wsłuchać się w jej
      „echo ciszy”, możemy przemienić ciszę w magię, magię w dźwięk, a dźwięk w piękno. Wtedy
      samotność znajduje towarzysza, trwoga zamienia się w pokój, cierpienie w radość — a
      zagubiona pieśń otrzymuje odpowiedź tej samej mocy.
    attribution: "Bernat Vivancos"
    about: "o utworze Le cri des bergers, od którego wieczór wziął nazwę"
  programLede: "Dwanaście pieśni gór — i bis"
  programArc: >-
    Kolejność prowadzi w górę i z powrotem. Wieczór otwiera wołanie bez słów — pasterskie „Eee-Ooo”
    z Pirenejów — a zaraz potem to samo wołanie dostaje słowa: Salve Regina pasterzy z Rouergue,
    „Ad te clamamus”, do Ciebie wołamy. Stąd program wspina się przez Ave Maria i trzy hymny
    śpiewane przed Najświętszym Sakramentem aż po nocne niebo Ešenvaldsa; tam wypada przerwa.
    Druga część zaczyna nisko i po ludzku, od wiejskiego skrzypka, a potem trzy razy próbuje lotu:
    ptak Monteverdiego, Bach, i skowronek Vaughana Williamsa, który ginie w świetle. Zostaje powrót
    na ziemię — lód na Prośnie — i bis, w którym światło zstępuje z tronu z powrotem ku nam.
  programNote: >-
    Wieczór trwał godzinę i trzy kwadranse, z przerwą; gospodarzami koncertu byli
    Dworek Gościnny i Pieniny Resort & SPA.
  # Default textNote would claim "przekłady polskie własne" — untrue here: Salve Regina,
  # Tantum ergo, O salutaris and the Górecki carry the traditional church translations.
  textNote: >-
    Teksty łacińskie i oryginalne — z programów zespołu; przekłady polskie hymnów
    i antyfon za tradycją kościelną, pozostałe własne.
