  movements:
    - id: clamor
      lat: Clamor
      pl: Wołanie
      line: >-
        Zew pasterzy odbity od zboczy — jeszcze bez słów, sam głos w przestrzeni.
    - id: advocata
      lat: Advocata
      pl: Orędowniczka
      line: >-
        Wołanie znajduje adresata: Matkę, do której wołają wygnańcy — i kobiety, których praca
        trzyma świat w ruchu.
    - id: sacramentum
      lat: Sacramentum
      pl: Tajemnica ołtarza
      line: >-
        Trzy hymny przed Najświętszym Sakramentem: dwa do słów św. Tomasza z Akwinu — raz
        w polifonii korsykańskiej, raz u współczesnego Łotysza — i polska pieśń Góreckiego.
    - id: astra
      lat: Astra
      pl: Gwiazdy
      line: >-
        Najwyższy punkt pierwszej części: samotna noc pod gwiazdami, których eony nie zdołają
        zasmucić ani zmęczyć.
    - id: volatus
      lat: Volatus
      pl: Lot
      line: >-
        Po przerwie ziemia i powietrze: wiejski skrzypek, zakochany ptak, Bach — i skowronek,
        który wznosi się, aż zginie w świetle.
    - id: reditus
      lat: Reditus
      pl: Powrót
      line: >-
        Z nieba z powrotem na ziemię: zamarznięta rzeka, dziewczyna przy młynie — i światło,
        które zstępuje, by jutro wzejść na nowo.
  program:
    - composer: "Bernat Vivancos"
      years: "ur. 1973"
      work: "Le cri des bergers"
      movement: clamor
      year: "2004"
      voicing: "a 12"
      note: >-
        Wołanie pasterzy z Pirenejów — jedyny „tekst” tego utworu to zew „Eee-Ooo”. Vivancos,
        przez lata związany z Escolanią de Montserrat, osnuwa wokół niego dwanaście głosów
        rozpisanych na całą przestrzeń sali. Od tego bezsłownego wołania bierze nazwę cały wieczór.
      inscriptio: "Pastores erant in regione eadem vigilantes"
      inscriptioPl: "Pasterze trzymali straż nocną nad swoją trzodą"
      inscriptioRef: "Łk 2, 8"
    - composer: "Anonim / tradycja Oksytanii"
      work: "Salve Regina"
      movement: advocata
      note: >-
        Antyfona maryjna w wersji pasterzy z Rouergue — dawnej krainy w dzisiejszej Oksytanii —
        i mnichów z miasteczka Estaing. Surowa, prosta polifonia bliska korsykańskiej: wielogłos
        jest tu formą wspólnoty. Stąd pochodzi zdanie, które stoi jako napis nad całym wieczorem:
        „Ad te clamamus” — do Ciebie wołamy. Bezsłowne wołanie z pierwszego utworu dostaje tu
        słowa. W nagraniach tej wersji antyfonę domyka Zdrowaś Maryjo recytowane w dialekcie
        oksytańskim — „Adiu, Maria, siás tot de gràcia…” — modlitwa w mowie, którą pasterze
        naprawdę mówili.
      inscriptio: "Salve, Regina, mater misericordiae"
      inscriptioPl: "Witaj Królowo, Matko Miłosierdzia · antyfona maryjna"
      text: |-
        Salve, Regina, mater misericordiae,
        vita, dulcedo et spes nostra, salve.
        Ad te clamamus, exsules filii Hevae.
        Ad te suspiramus gementes et flentes
        in hac lacrimarum valle.
        Eia ergo, advocata nostra,
        illos tuos misericordes oculos ad nos converte.
        Et Jesum, benedictum fructum ventris tui,
        nobis post hoc exsilium ostende.
        O clemens, o pia, o dulcis Virgo Maria.
      textPl: |-
        Witaj Królowo, Matko Miłosierdzia,
        życie, słodyczy i nadziejo nasza, witaj!
        Do Ciebie wołamy wygnańcy, synowie Ewy;
        do Ciebie wzdychamy jęcząc i płacząc
        na tym łez padole.
        Przeto, Orędowniczko nasza,
        one miłosierne oczy Twoje na nas zwróć,
        a Jezusa, błogosławiony owoc żywota Twojego,
        po tym wygnaniu nam okaż.
        O łaskawa, o litościwa, o słodka Panno Maryjo!
    - composer: "David MacIntyre"
      years: "ur. 1952"
      work: "Ave Maria"
      movement: advocata
      year: "1994"
      voicing: "a 6 · SSSAAA"
      note: >-
        Kanadyjski kompozytor pisał ją, zbierając materiały do opery o wydarzeniach w Medziugorju,
        w ogarniętej wówczas wojną Bośni: sześcioro dzieci, którym od czerwca 1981 roku miała się
        codziennie ukazywać Matka Boża, i tłum odmawiający w tym czasie różaniec. Stąd sześć
        głosów — sześcioro dzieci, sześć partii; utwór na same głosy wysokie. Fermata na ostatnim,
        cichym takcie to w zamyśle MacIntyre'a moment zjawienia.
      inscriptioPl: "na sześć głosów wysokich · fermata ciszy na końcu"
    - composer: "Polifonia korsykańska"
      work: "Tantum ergo sacramentum"
      movement: sacramentum
      year: "XVII w."
      note: >-
        Korsykańska polifonia z tradycji franciszkańskiej. Tekst to dwie ostatnie zwrotki hymnu
        Pange lingua św. Tomasza z Akwinu (XIII w.), śpiewane przy adoracji — najczęściej na
        repozycję, gdy Najświętszy Sakrament wraca do tabernakulum.
      inscriptio: "Tantum ergo Sacramentum veneremur cernui"
      inscriptioPl: "Przed tak wielkim Sakramentem upadajmy na twarze · z hymnu Pange lingua"
      text: |-
        Tantum ergo Sacramentum
        veneremur cernui:
        et antiquum documentum
        novo cedat ritui:
        praestet fides supplementum
        sensuum defectui.

        Genitori, Genitoque
        laus et jubilatio,
        salus, honor, virtus quoque
        sit et benedictio:
        procedenti ab utroque
        compar sit laudatio.
        Amen.
      textPl: |-
        Przed tak wielkim Sakramentem
        upadajmy wszyscy wraz,
        niech przed Nowym Testamentem
        starych praw ustąpi czas:
        co dla zmysłów niepojęte,
        niech dopełni wiara w nas.

        Bogu Ojcu i Synowi
        hołd po wszystkie nieśmy dni:
        niech podaje wiek wiekowi
        hymn triumfu, dzięki, czci;
        a równemu Im Duchowi
        niechaj wieczna chwała brzmi.
        Amen.
    - composer: "Ēriks Ešenvalds"
      years: "ur. 1977"
      work: "O salutaris hostia"
      movement: sacramentum
      year: "2005"
      note: >-
        Znowu św. Tomasz z Akwinu — dwie ostatnie zwrotki hymnu Verbum supernum prodiens,
        napisanego na Boże Ciało i śpiewanego przy wystawieniu Najświętszego Sakramentu.
        Ten sam obrzęd co przed chwilą, tylko język o siedem wieków późniejszy: u Ešenvaldsa
        wielowarstwowe harmonie i chóralne klastry.
      inscriptio: "O salutaris Hostia, quae caeli pandis ostium"
      inscriptioPl: "O Zbawcza Hostio, która otwierasz bramy nieba · z hymnu Verbum supernum prodiens"
      text: |-
        O salutaris Hostia,
        quae caeli pandis ostium:
        bella premunt hostilia,
        da robur, fer auxilium.

        Uni trinoque Domino
        sit sempiterna gloria,
        qui vitam sine termino
        nobis donet in patria.
        Amen.
      textPl: |-
        O zbawcza Hostio, godna czci,
        co lud do niebios wiedziesz bram.
        Bój srogi nęka wiernych Ci,
        daj siłę, pomoc ześlij nam.

        Jednemu w Trójcy Władcy ziem
        niech będzie chwała w każdy czas,
        niech On wieczystym życiem Swym
        w Ojczyźnie rajskiej darzy nas.
        Amen.
    - composer: "Henryk Mikołaj Górecki"
      years: "1933–2010"
      work: "Sanctus, Sanctus, Sanctus"
      movement: sacramentum
      year: "1986"
      note: >-
        Z cyklu dwudziestu jeden Pieśni kościelnych op. 84, które Górecki napisał w Katowicach
        w 1986 roku, opierając je na melodiach ze Śpiewnika kościelnego ks. Jana Siedleckiego —
        tego samego, z którego śpiewa się w polskich kościołach od pokoleń. Minimalne środki,
        maksymalny efekt. Oryginał jest polski i mówi „Jezu, jesteś niepojęty”; tu zabrzmiała
        wersja łacińska, w której ten sam wers mówi „Jezu, przychodzisz do nas”.
      inscriptioPl: "z cyklu Pieśni kościelne op. 84 · oryginał polski: Święty, święty, święty"
      text: |-
        Sanctus, sanctus, sanctus,
        sanctus semper sanctus,
        Jesu Christe venis nobis
        sanctissimo Sacramento.
      textPl: |-
        Święty, Święty, Święty,
        Święty zawsze Święty,
        Jezu, przychodzisz do nas
        w Najświętszym Sakramencie.
    - composer: "Ēriks Ešenvalds"
      years: "ur. 1977"
      work: "Stars"
      movement: astra
      year: "2011"
      note: >-
        Wiersz amerykańskiej poetki Sary Teasdale o samotnej nocy pod gwiazdami. Ešenvalds dopisał
        do chóru szklane harmonijki — strojone kieliszki, po których wodzi się mokrym palcem — żeby
        brzmiały jak migotanie. Harmonie są otwarte i przestronne; to najwyższy punkt wieczoru,
        i na nim kończy się pierwsza część.
      inscriptioPl: "tekst: Sara Teasdale"
      text: |-
        Alone in the night
        on a dark hill
        with pines around me
        spicy and still,

        and a heaven full of stars
        over my head,
        white and topaz
        and misty red;

        myriads with beating
        hearts of fire
        that aeons
        cannot vex or tire;

        up the dome of heaven
        like a great hill,
        I watch them marching
        stately and still,

        and I know that I
        am honored to be
        witness
        of so much majesty.
      textPl: |-
        Samotny w nocy
        na ciemnym wzgórzu,
        wśród sosen
        pachnących i cichych,

        a nad głową
        niebo pełne gwiazd —
        białych, topazowych
        i zamglonych czerwienią;

        miriady o bijących
        sercach z ognia,
        których eony
        nie zdołają zasmucić ani zmęczyć;

        w górę kopuły nieba,
        jak na wielkie wzgórze,
        patrzę, jak maszerują
        dostojnie i spokojnie,

        i wiem, że mam
        zaszczyt być
        świadkiem
        tak wielkiego majestatu.
      clasp: "Przerwa"
    - composer: "George Enescu"
      years: "1881–1955"
      work: "Ménétrier"
      movement: volatus
      year: "1940"
      voicing: "skrzypce solo"
      note: >-
        Pierwsza z dziesięciu miniatur cyklu Impressions d'enfance op. 28 — wspomnień z dzieciństwa
        ułożonych wedle biegu dnia: od skrzypka, przez świerszcza i wiatr w kominie, po nocną burzę
        i wschód słońca. Ménétrier to wiejski skrzypek, ten od wesel. Otwiera drugą część wieczoru;
        gra Radu Ropotan — jak Enescu, Rumun.
      inscriptioPl: "z cyklu Impressions d'enfance op. 28 · wiejski skrzypek"
    - composer: "Claudio Monteverdi"
      years: "1567–1643"
      work: "Quel augellin che canta"
      movement: volatus
      year: "1603"
      note: >-
        Madrygał z czwartej księgi madrygałów pięciogłosowych, wydanej w Wenecji w 1603 roku —
        u progu przejścia od renesansowej polifonii do baroku, gdy muzyka zaczyna malować afekty.
        Ptak, który śpiewa „tak słodko”, jest metaforą zakochanego serca: gdyby miał ludzką duszę,
        powiedziałby „płonę z miłości” — a drugi ptak mu odpowiada.
      inscriptio: "Quel augellin che canta sì dolcemente"
      inscriptioPl: "Ten ptaszek, co śpiewa tak słodko · z IV księgi madrygałów"
      text: |-
        Quel augellin che canta
        sì dolcemente
        e lascivetto vola
        hor da l'abete al faggio
        et hor dal faggio al mirto,
        s'havesse humano spirto,
        direbb': Ardo d'amor, ardo d'amore!
        Ma ben arde nel core
        e chiam' il suo desio
        che li rispond': Ardo d'amor anch' io!
        Che sii tu benedetto,
        amoroso, gentil, vago augelletto!
      textPl: |-
        Ten ptaszek, co śpiewa
        tak słodko
        i z figlarną lekkością lata
        to do jodły, to do buka,
        a potem do mirtu —
        gdyby miał ludzkiego ducha,
        rzekłby: Płonę z miłości, płonę z miłości!
        Lecz płonie w sercu
        i woła swoje pragnienie,
        które mu odpowiada: Płonę z miłości i ja!
        Bądź błogosławiony,
        kochający, delikatny, piękny ptaszku!
    - composer: "J. S. Bach"
      years: "1685–1750"
      work: "Preludium z Partity E-dur BWV 1006"
      movement: volatus
      year: "1720"
      voicing: "skrzypce solo"
      note: >-
        Z trzeciej partity, z cyklu sześciu sonat i partit na skrzypce solo ukończonego w 1720 roku —
        arcydzieł literatury skrzypcowej. Czysta energia i lekkość: druga w tym programie chwila,
        gdy zostają same skrzypce, i most między ptakiem Monteverdiego a skowronkiem Vaughana
        Williamsa.
      inscriptioPl: "z Partity na skrzypce solo nr 3 E-dur"
    - composer: "Ralph Vaughan Williams"
      years: "1872–1958"
      work: "The Lark Ascending · oprac. P. Drayton"
      movement: volatus
      year: "1914 · rev. 1920"
      voicing: "skrzypce i chór"
      note: >-
        Pastoralny poemat na skrzypce, napisany w 1914 roku i zrewidowany w 1920; na prawykonanie
        czekał sześć lat, bo wybuchła wojna. Inspirował go wiersz George'a Mereditha o skowronku
        wznoszącym się ku niebu — linia melodyczna wznosi się i opada, naśladując lot. Paul Drayton
        przepisał utwór na skrzypce i chór, więc słowa Mereditha, w oryginale tylko wypisane nad
        nutami, tutaj naprawdę słychać.
      inscriptioPl: "tekst: George Meredith · oprac. na skrzypce i chór: Paul Drayton"
      text: |-
        He rises and begins to round,
        he drops the silver chain of sound,
        of many links without a break,
        in chirrup, whistle, slur and shake.

        For singing till his heaven fills,
        'tis love of earth that he instils,
        and ever winging up and up,
        our valley is his golden cup
        and he the wine which overflows
        to lift us with him as he goes.

        Till lost on his aerial rings
        in light, and then the fancy sings.
      textPl: |-
        Wzbija się i zaczyna zataczać kręgi,
        upuszcza srebrny łańcuch dźwięku
        o wielu ogniwach, bez przerwy,
        w ćwierkaniu, gwizdach, ślizgach i drżeniu.

        Bo śpiewa, aż jego niebo się wypełni —
        to miłość do ziemi w nas zaszczepia;
        i wciąż wznosząc się wyżej i wyżej,
        nasza dolina jest jego złotym kielichem,
        a on winem, które się przelewa,
        by unieść nas z sobą, gdy odchodzi.

        Aż zginie w swoich powietrznych kręgach
        w świetle — i wtedy śpiewa wyobraźnia.
    - composer: "Jacek Sykulski"
      years: "ur. 1964"
      work: "Stoi lód na Prośnie"
      movement: reditus
      year: "2017"
      note: >-
        Sykulski napisał go na zamówienie Agnieszki Franków-Żelazny dla Polskiego Narodowego Chóru
        Młodzieżowego — jako wokalizę, bez słów. Czegoś w nim jednak brakowało: „utwór nie niósł
        żadnego przesłania”. Kompozytor wysłał więc partyturę koledze, a ten w ciągu jednej nocy
        dopisał całą historię — tak dopasowaną, że w muzyce nie trzeba było zmienić ani nuty.
        Dziewczyna z Podzamcza płacze nad zamarzniętą Prosną, młyn stoi, chleba nie będzie —
        a Jan Nepomucen, patron mostów i rzek, stoi przy niej.
      inscriptioPl: "pieśń w idiomie ludowym · słowa dopisane do wokalizy"
      text: |-
        Stoi lód na Prośnie,
        stoi koło młyna —
        pięć lat tu przychodzi
        z Podzamcza dziewczyna.

        Stoi dziewcze, kwili,
        w dłoniach fular skrywa,
        Święty Roch na sumę
        ku pociesze wzywa.

        Oj dana, oj dana…

        Stoi młyn, lecz któż ma
        koło rozklekotać?
        Nie ma mąki, nie ma
        i nie będzie chleba.

        Dana, dana… na na, na na…

        Stoi lód na Prośnie,
        czas pod lodem płynie,
        a Jan Nepomucen
        stoi przy dziewczynie.

        Dana, dana… na na…
    - composer: "Ken Steven"
      years: "ur. 1993"
      work: "Dawn and Dusk"
      movement: reditus
      year: "2020"
      note: >-
        Indonezyjski kompozytor oparł utwór na skali Melayu, a śpiewane sylaby nie znaczą nic —
        to czysta eksploracja barw ludzkiego głosu. Punktem wyjścia jest wiersz, który Steven
        napisał sam. W partyturze prosi chór, by w pierwszych taktach dodał odgłosy nocnych
        zwierząt — świerszcza, sowy — a potem, coraz gęściej, świergot ptaków; na końcu wszystko
        wraca i cichnie.
      inscriptioPl: "wiersz kompozytora · śpiewane sylaby nie mają znaczenia"
      text: |-
        It was a quiet night
        — when a glimpse of light slowly gazed upon the sky.

        Awakening the sleeping souls
        — joyfully singing
        — dancing in the ray of light
        — and slowly

        it will descend again from its mighty throne.
      textPl: |-
        Była cicha noc
        — gdy spojrzenie światła powoli spoczęło na niebie.

        Budząc śpiące dusze
        — radośnie śpiewające
        — tańczące w promieniu światła
        — i powoli

        znów zstąpi ze swego potężnego tronu.
      bis: true

- id: 9-kart
  order: 3
  roman: "III"
  latin: Psalmi
  title: 9 Kart z Księgi Psalmów
  meta: "Rybnik · Łódź · Bazylika NSPJ, Kraków · 2024"
  venue: "Bazylika NSPJ, Kraków / Archikatedra, Łódź / Bazylika św. Antoniego, Rybnik"
  viaDate: "2024"
  about:
    place: "Rybnik · Łódź · Kraków"
    blurb: "Program zbudowany z psalmów: od pokuty i dziękczynienia po radość uwielbienia, z muzyką Allegriego, Bacha, Rossiego, Brucknera i Stanforda."
    img: o-nas-9-kart
  accent: "#bfa05f"
  inscriptio: "Miserere mei, Deus, secundum magnam misericordiam tuam"
  inscriptioPl: "Zmiłuj się nade mną, Boże, w swojej łaskawości"
  inscriptioRef: "Ps 51"
  essence: "Psalm jest miejscem, gdzie człowiek nie musi upraszczać siebie przed Bogiem. Miserere Allegriego, podzielone na dziewięć części, oplatało cały wieczór — między jego pokutne strofy wchodziły kolejno psalmy dziękczynienia, mądrości i radości."
  facts:
    - 9 psalmów
    - 6 / 8 / 9 / 12 głosów
    - Miserere jako klamra
  bg: st-9-kart-bg
  heroImg: o-nas-9-kart
  poster: poster-9-kart
  posterAlt: Plakat koncertu 9 Kart z Księgi Psalmów
  # spotify (private — uncomment when playlist becomes public): https://open.spotify.com/playlist/6quiVYU28Sl3Fx17VZulSc
  hasPage: true
  # Booklet documents cities + hours for all three evenings and a venue only for Kraków;
  # Rybnik + Łódź confirmed by the owner (2026-07-17).
  dates:
    - { date: "2024-09-08", venue: "Bazylika św. Antoniego, Rybnik", time: "16:30" }
    - { date: "2024-09-17", venue: "Archikatedra, Łódź", time: "19:00" }
    - { date: "2024-11-16", venue: "Bazylika NSPJ, ul. Kopernika 26, Kraków", time: "20:00" }
  prologue: >-
    Szesnasty listopada 2024, Bazylika NSPJ w Krakowie — trzeci wieczór tego programu, po Rybniku
    i Łodzi. Zanim zabrzmi pierwszy dźwięk, o. Przemysław Wysogląd SJ nakreśla kontekst psalmów,
    a przestrzeń rzeźbi światło Ady Bystrzyckiej. Zespół prosi o jedno: nie oklaskiwać
    poszczególnych utworów i zachować ciszę między nimi.
  reflectionNote: >-
    Psałterz nie porządkuje uczuć — kładzie je obok siebie: skarga sąsiaduje z dziękczynieniem,
    prośba o litość z wezwaniem do tańca. Dziewięć kart tego wieczoru wybrano właśnie dla tej
    rozpiętości, a spięto je jedną modlitwą pokutną, która wraca dziewięć razy i nie pozwala
    o sobie zapomnieć.
  credits:
    - { role: "Dyrygent", name: "Florent de Bazelaire" }
    - { role: "Słowo wprowadzające", name: "o. Przemysław Wysogląd SJ" }
    - { role: "Reżyseria światła", name: "Ada Bystrzycka" }
  programLede: "Dziewięć psalmów, oplecionych Miserere"
  programArc: >-
    Przy liście utworów zespół dopisał dwa słowa: „kolejność ważna”. Wieczór zaczyna się od pokuty —
    Miserere Allegriego, Psalm 51 — i natychmiast ją przerywa: psalm zostaje rozcięty na dziewięć
    części, a między nie wchodzą kolejno chwała, mądrość, prawo, radość, tron, dziękczynienie
    i pieśń nowa. Pokutnik nie dokończy swojej modlitwy, dopóki nie wybrzmi każdy inny głos
    Psałterza; dopiero po ostatnim wraca po raz dziewiąty i dopowiada ją do końca. Tak jak w życiu,
    w którym żal i radość nie ustawiają się w kolejce — przeplatają się.
  programNote: >-
    Skład trzynaściorga wokalistów odnotowano dla wieczoru krakowskiego (16 listopada 2024);
    ten sam program, w tej samej kolejności, zespół wykonał wcześniej w Rybniku i w Łodzi.
  textNote: >-
    Teksty i przekłady polskie — za programem koncertu.
  # No `movements`: this evening has no acts to group. One psalm is cut into nine parts and
  # braided through the other eight, so the braid IS the structure — the clasps carry it.
