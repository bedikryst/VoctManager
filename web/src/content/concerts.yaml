  viaDate: sty 2024
  about:
    place: "Bazylika NSPJ · Kraków"
    blurb: "Debiut cyklu Koncertów Duchowych: renesans, barok i współczesność ułożone wokół tajemnicy Bożego Narodzenia oraz Wcielenia."
